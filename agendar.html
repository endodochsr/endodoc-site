<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agendar — EndoDoc</title>
<link rel="icon" href="/brand/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/brand/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
<link rel="manifest" href="/brand/site.webmanifest" />
<meta name="theme-color" content="#0a5d5c" />
<meta property="og:title" content="Agendar consulta — EndoDoc" />
<meta property="og:description" content="Agende sua consulta de endodontia direto pelo EndoDoc." />
<meta property="og:image" content="https://endodoc.com.br/brand/og.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://endodoc.com.br/brand/og.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4f7f7;--surface:#fff;--surface-2:#f0f5f4;--ink:#16302f;--muted:#5e706f;--primary:#0e7c7b;--primary-d:#0a5d5c;--primary-soft:#e3f1f0;--accent:#c2a063;--success:#2e7d57;--success-soft:#e4f3ec;--danger:#c0492f;--danger-soft:#fbeae6;--border:#e4ecec;--shadow:0 1px 2px rgba(16,48,47,.04),0 8px 24px rgba(16,48,47,.06);--shadow-lg:0 12px 40px rgba(16,48,47,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700}
  .logo .mark{width:34px;height:34px;border-radius:10px;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:600;font-size:15px;transition:.15s}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(14,124,123,.25)}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:var(--surface-2);color:var(--ink)}
  .btn-block{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .field textarea{resize:vertical;min-height:70px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pub-banner{background:var(--primary-soft);color:var(--primary-d);text-align:center;font-size:13px;font-weight:600;padding:8px}
  .pub-top{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 70px}
  .prof{display:flex;align-items:center;gap:16px;margin-bottom:22px}
  .prof .av{width:60px;height:60px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:26px}
  .prof h1{font-size:24px}.prof p{color:var(--muted)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:22px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{width:38px;height:38px;border-radius:10px;background:var(--surface-2);font-size:18px;color:var(--ink);display:grid;place-items:center}
  .cal-month{font-family:'Fraunces',serif;font-size:20px;text-transform:capitalize}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal-dow{text-align:center;font-size:11.5px;font-weight:600;color:var(--muted);padding:3px 0;text-transform:uppercase}
  .cal-cell{aspect-ratio:1/1;border-radius:11px;border:1.5px solid transparent;background:var(--surface-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .cal-cell.empty{background:transparent}
  .cal-cell.muted{color:#b9c6c5;background:#fafcfc}
  .cal-cell .num{font-weight:600;font-size:15px}
  .cal-cell.today{border-color:var(--accent)}
  .cal-cell.avail{cursor:pointer;background:var(--primary-soft);color:var(--primary-d)}
  .cal-cell.avail:hover{border-color:var(--primary)}
  .slot-dot{font-size:10px;font-weight:600;color:var(--primary)}
  .legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
  .legend i{width:13px;height:13px;border-radius:4px;display:inline-block}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:10px 16px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:14px;color:var(--ink)}
  .chip:hover{border-color:var(--primary)}
  .chip.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chip.rec{background:#fff8e7;border-color:#e8c87a;color:#7a5a14}
  .chip.rec:hover{border-color:#c89a2a}
  .chip.rec.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chip.no-fit{background:#fafcfc;color:#b9c6c5;border-color:#eef3f3;cursor:not-allowed}
  .chip.no-fit:hover{border-color:#eef3f3}
  .overlay{position:fixed;inset:0;background:rgba(16,48,47,.42);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:460px;max-height:90vh;overflow:auto;padding:26px}
  .modal h3{font-size:21px}.modal .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:6px 0 10px}
  .center{min-height:60vh;display:grid;place-items:center;color:var(--muted);text-align:center;padding:20px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:#9c3a25}.toast.ok{background:#1f5d4b}
  /* página pública — clínico aconchegante */
  body{background:#f5efe6}
  .pub-banner{background:var(--primary-d);color:#fff}
  .pub-top{background:#fff}
  .pub-hero{position:relative;padding:50px 24px 40px;overflow:hidden;background:radial-gradient(1100px 380px at 50% 0%,#0e7c7b 0%,#0a5d5c 60%,#08494a 100%);color:#fff}
  .pub-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(194,160,99,.18) 0%,transparent 55%);pointer-events:none}
  .pub-hero::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:36px;background:linear-gradient(180deg,transparent,#f5efe6);pointer-events:none}
  .pub-hero-inner{position:relative;max-width:760px;margin:0 auto;display:flex;align-items:center;gap:26px;z-index:2}
  .pub-photo-wrap{position:relative;flex-shrink:0}
  .pub-photo-wrap::before{content:"";position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),#e6d3a7,var(--accent));opacity:.55;filter:blur(2px)}
  .pub-photo{position:relative;width:128px;height:128px;border-radius:50%;background:#fff;color:var(--primary-d);display:grid;place-items:center;font-family:'Fraunces',serif;font-size:50px;font-weight:600;overflow:hidden;box-shadow:0 14px 38px rgba(0,0,0,.25);border:5px solid #fff}
  .pub-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .pub-name{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1.1;letter-spacing:-.015em;color:#fff}
  .pub-specialty{display:inline-block;margin-top:10px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,.13);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.22)}
  .pub-tagline{font-size:14.5px;color:rgba(255,255,255,.84);margin-top:12px;font-family:'Fraunces',serif;font-style:italic}
  .pub-badges{max-width:760px;margin:-12px auto 28px;padding:0 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:3}
  .pub-badge{background:#fff;border:1px solid #e8dfcf;border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 4px 14px rgba(64,48,28,.06)}
  .pub-badge .ico{font-size:22px;margin-bottom:4px}
  .pub-badge .t{font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:.01em}
  .pub-badge .s{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}
  .pub-bio{margin:0 auto 26px;max-width:760px;padding:0 22px}
  .pub-bio-inner{background:#fffbf2;border:1px solid #ecdfbf;border-left:4px solid var(--accent);border-radius:0 14px 14px 0;padding:18px 22px;font-family:'Fraunces',serif;font-style:italic;font-size:17px;line-height:1.6;color:#3a2f17;position:relative}
  .pub-bio-inner::before{content:"“";position:absolute;left:14px;top:-6px;font-family:'Fraunces',serif;font-size:48px;color:var(--accent);opacity:.55;line-height:1}
  .pub-bio-inner{padding-left:42px}
  .pub-section{max-width:760px;margin:0 auto 22px;padding:0 22px}
  .pub-section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .pub-section-head .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .pub-section h3{font-family:'Fraunces',serif;font-size:19px;color:var(--ink);font-weight:600;letter-spacing:-.005em}
  .pub-proc-pills{display:flex;flex-wrap:wrap;gap:10px}
  .pub-proc-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:#fff;color:#2a4544;font-size:14px;font-weight:500;border:1px solid #e8dfcf;box-shadow:0 2px 6px rgba(64,48,28,.04)}
  .pub-proc-pill::before{content:"✓";color:var(--primary);font-weight:700}
  .pub-howit{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px}
  .pub-step{background:#fff;border:1px solid #e8dfcf;border-radius:14px;padding:16px 14px;text-align:center}
  .pub-step .num{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:50%;background:var(--primary-soft);color:var(--primary-d);font-family:'Fraunces',serif;font-weight:700;font-size:15px;margin-bottom:8px}
  .pub-step .t{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .pub-step .s{font-size:12.5px;color:var(--muted);line-height:1.4}
  .pub-cal-card{background:#fff;border:1px solid #e8dfcf;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(64,48,28,.08)}
  .pub-footer{max-width:760px;margin:18px auto 0;padding:24px 22px 40px;text-align:center;color:var(--muted);font-size:12.5px}
  @media(max-width:560px){
    .pub-hero{padding:38px 20px 32px}
    .pub-hero-inner{flex-direction:column;text-align:center;gap:16px}
    .pub-name{font-size:26px}
    .pub-badges{grid-template-columns:1fr;margin-top:-6px}
    .pub-howit{grid-template-columns:1fr}
    .pub-bio-inner{font-size:15.5px}
    .pub-cal-card{padding:14px}
    .cal-grid{gap:5px}
    .cal-cell .num{font-size:14px}
    .slot-dot{font-size:9.5px;line-height:1.1}
    .legend{justify-content:center;font-size:12px}
  }
</style>
</head>
<body>
<div class="pub-banner">Página de agendamento — escolha um horário disponível</div>
<div class="pub-top"><div class="logo"><div class="mark">E</div><span>EndoDoc</span></div></div>

<div id="root"><div class="center">Carregando…</div></div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL='https://tuolwdniugjwbepujqoy.supabase.co';
const SUPA_KEY='sb_publishable_NwPGO0Ntxu92Lr_CkdMtvg_Je__gZMr';
let sb=null;
const PROCEDURES=['Tratamento de canal','Retratamento endodôntico','Pulpectomia','Urgência endodôntica','Avaliação / diagnóstico'];
const MES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let prof=null, availMap={}, calRef=new Date(); calRef.setDate(1);
let book={date:null,slots:[],duration:1}; // duration = quantidade de horas (1, 2, 3)
let smartHints={}; // {slot_time: true} pro dia atualmente aberto

function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayISO(){const d=new Date();d.setHours(0,0,0,0);return iso(d);}
function hhmm(t){return (t||'').slice(0,5);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtLong(s){const[y,m,d]=s.split('-').map(Number);return DOW[new Date(y,m-1,d).getDay()]+', '+d+' de '+MES[m-1];}
function getSlug(){const p=new URLSearchParams(location.search);let s=p.get('slug')||p.get('p')||'';if(!s){const path=location.pathname.split('/').filter(Boolean).pop();if(path&&!path.endsWith('.html'))s=path;}return s;}
let tT;function toast(t,type){const e=document.getElementById('toast');e.textContent=(type==='ok'?'✓ ':type==='err'?'⚠ ':'')+t;e.className='toast show '+(type||'');clearTimeout(tT);tT=setTimeout(()=>e.className='toast',3200);}
function openModal(h){document.getElementById('modal').innerHTML=h;document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

async function init(){
  if(!window.supabase){document.getElementById('root').innerHTML='<div class="center">Não consegui carregar a biblioteca. Recarregue a página.</div>';return;}
  sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  const slug=getSlug();
  if(!slug){ askSlug(); return; }
  const {data,error}=await sb.from('public_professionals').select('*').eq('slug',slug).maybeSingle();
  if(error||!data){ document.getElementById('root').innerHTML='<div class="center">Profissional não encontrado.<br>Verifique o link.</div>'; return; }
  prof=data;
  if(prof.accepting_bookings!==false){ await loadAvailability(); }
  render();
}
function askSlug(){
  document.getElementById('root').innerHTML=`<div class="wrap"><div class="card">
    <div class="section-title">Demonstração</div>
    <div class="field"><label>Qual o link do profissional? (slug)</label><input id="slugInp" placeholder="ex.: hudson-real"></div>
    <button class="btn btn-primary" onclick="goSlug()">Abrir agenda</button>
    <p style="font-size:12.5px;color:var(--muted);margin-top:10px">No site final, o endereço endodoc.com.br/nome-do-profissional já abre direto.</p>
  </div></div>`;
}
function goSlug(){const s=document.getElementById('slugInp').value.trim();if(s)location.search='?slug='+encodeURIComponent(s);}

async function loadAvailability(){
  availMap={};
  const from=todayISO();
  const end=new Date();end.setDate(end.getDate()+90);
  const {data,error}=await sb.rpc('get_availability',{p_slug:prof.slug,p_from:from,p_to:iso(end)});
  if(error){toast('Erro ao carregar horários: '+error.message,'err');return;}
  (data||[]).forEach(r=>{const d=r.slot_date;(availMap[d]=availMap[d]||[]).push(hhmm(r.slot_time));});
  Object.values(availMap).forEach(a=>a.sort());
}

function render(){
  const av=(prof.name||'').replace(/^Dr[a]?\.\s*/i,'')[0]||'D';
  const fotoHtml = prof.avatar_url
    ? `<img src="${esc(prof.avatar_url)}" alt="">`
    : esc(av);
  const heroHtml = `<div class="pub-hero"><div class="pub-hero-inner">
    <div class="pub-photo-wrap"><div class="pub-photo">${fotoHtml}</div></div>
    <div>
      <div class="pub-name">${esc(prof.name||'')}</div>
      <div class="pub-specialty">${esc(prof.specialty||'Endodontia')}</div>
      <div class="pub-tagline">Atendimento no seu consultório, com agendamento online.</div>
    </div>
  </div></div>`;
  const badgesHtml = `<div class="pub-badges">
    <div class="pub-badge"><div class="ico">🦷</div><div class="t">Atendimento delivery</div><div class="s">Vou até o seu consultório</div></div>
    <div class="pub-badge"><div class="ico">📅</div><div class="t">Agenda online</div><div class="s">Sem WhatsApp, sem espera</div></div>
    <div class="pub-badge"><div class="ico">✓</div><div class="t">Confirmação automática</div><div class="s">Pelo Google Agenda</div></div>
  </div>`;
  const bioHtml = prof.bio && prof.bio.trim()
    ? `<div class="pub-bio"><div class="pub-bio-inner">${esc(prof.bio)}</div></div>`
    : '';
  const procs = Array.isArray(prof.procedures) ? prof.procedures.filter(Boolean) : [];
  const procsHtml = procs.length
    ? `<div class="pub-section">
         <div class="pub-section-head"><span class="dot"></span><h3>Procedimentos atendidos</h3></div>
         <div class="pub-proc-pills">${procs.map(p=>`<span class="pub-proc-pill">${esc(p)}</span>`).join('')}</div>
       </div>`
    : '';
  const howHtml = `<div class="pub-section">
    <div class="pub-section-head"><span class="dot"></span><h3>Como funciona</h3></div>
    <div class="pub-howit">
      <div class="pub-step"><div class="num">1</div><div class="t">Escolha o dia</div><div class="s">Veja os horários livres no calendário abaixo</div></div>
      <div class="pub-step"><div class="num">2</div><div class="t">Preencha o consultório</div><div class="s">Nome, endereço e o procedimento</div></div>
      <div class="pub-step"><div class="num">3</div><div class="t">Confirmação na hora</div><div class="s">O profissional recebe e sincroniza na agenda</div></div>
    </div>
  </div>`;
  const body = (prof.accepting_bookings===false)
    ? `<div class="pub-section"><div class="pub-cal-card" style="text-align:center;padding:34px 22px">
        <div style="font-size:38px;line-height:1;margin-bottom:10px">📵</div>
        <h2 style="font-family:'Fraunces',serif;font-size:22px;margin-bottom:8px">Não estou aceitando agendamentos no momento</h2>
        <p style="color:var(--muted);font-size:14.5px">Tente novamente em breve, ou entre em contato direto com o profissional.</p>
       </div></div>`
    : `<div class="pub-section">
         <div class="pub-section-head"><span class="dot"></span><h3>Escolha um dia</h3></div>
         <div class="pub-cal-card">${calendarHTML()}</div>
       </div>`;
  const footerHtml = `<div class="pub-footer">Agendamento via EndoDoc · pagamento e procedimentos combinados diretamente com o profissional.</div>`;
  document.getElementById('root').innerHTML=`${heroHtml}${badgesHtml}${bioHtml}${procsHtml}${howHtml}${body}${footerHtml}`;
}
function calendarHTML(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate();
  const t=todayISO();let cells='';
  for(let i=0;i<start;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=iso(new Date(y,m,d));const free=(availMap[ds]||[]).length;const past=ds<t;
    let cls='cal-cell',extra='',click='';
    if(ds===t)cls+=' today';
    if(past||free===0){cls+=' muted';}
    else{cls+=' avail';click=`onclick="openDay('${ds}')"`;extra=`<div class="slot-dot">${free} ${free===1?'vaga':'vagas'}</div>`;}
    cells+=`<div class="${cls}" ${click}><div class="num">${d}</div>${extra}</div>`;
  }
  // padding: completa até múltiplo de 7 (sempre semanas inteiras)
  const total = start + days;
  const pad = (7 - (total % 7)) % 7;
  for(let i=0;i<pad;i++) cells+='<div class="cal-cell empty"></div>';
  return `<div class="cal-head"><div class="cal-month">${MES[m]} ${y}</div>
    <div class="cal-nav"><button onclick="moveMonth(-1)">‹</button><button onclick="moveMonth(1)">›</button></div></div>
    <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-grid" style="margin-top:7px">${cells}</div>
    <div class="legend"><span><i style="background:var(--primary-soft)"></i> Disponível</span><span><i style="background:#fafcfc;border:1px solid var(--border)"></i> Indisponível</span></div>`;
}
function moveMonth(n){calRef.setMonth(calRef.getMonth()+n);render();}

async function openDay(ds){
  book={date:ds,slots:[],duration:1};
  smartHints={};
  renderBooking(); // mostra slots logo
  // busca recomendações em background e re-renderiza
  try{
    const { data, error } = await sb.rpc('get_day_slots_smart',{p_slug:prof.slug,p_date:ds});
    if(error || !data) return;
    const map={}; data.forEach(r=>{ if(r.recommended) map[hhmm(r.slot_time)]=true; });
    smartHints=map;
    // só re-renderiza se o modal ainda é deste mesmo dia
    if(book.date===ds) renderBooking();
  }catch(_){}
}
function addHour(t,n){
  const [h,m]=t.split(':').map(Number);
  const total=h*60+m+n*60;
  return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
}
function rangeFromStart(start, n){
  const out=[start];
  for(let i=1;i<n;i++) out.push(addHour(start,i));
  return out;
}
function renderBooking(){
  const free=availMap[book.date]||[];
  const freeSet=new Set(free);
  openModal(`<h3>${fmtLong(book.date)}</h3><p class="sub">Escolha a duração, o horário inicial e preencha os dados.</p>
    <div class="section-title">Duração do atendimento</div>
    <div class="field" style="max-width:220px;margin-bottom:14px">
      <select id="bkDur" onchange="changeDuration(this.value)">
        <option value="1" ${book.duration===1?'selected':''}>1 hora</option>
        <option value="2" ${book.duration===2?'selected':''}>2 horas</option>
        <option value="3" ${book.duration===3?'selected':''}>3 horas</option>
      </select>
    </div>
    <div class="section-title">Horário inicial</div>
    <div class="chips" style="margin-bottom:8px">${free.map(s=>{
      const rec = smartHints[s];
      const range = rangeFromStart(s, book.duration);
      const fits = range.every(t=>freeSet.has(t));
      const selected = book.slots.includes(s);
      const cls = [
        'chip',
        selected?'sel':'',
        rec?'rec':'',
        !fits?'no-fit':''
      ].filter(Boolean).join(' ');
      const click = fits ? `onclick="pickSlot('${s}')"` : '';
      const title = fits ? '' : ` title="não cabe a duração escolhida"`;
      return `<button class="${cls}" data-s="${s}" ${click}${title}>${rec?'🌟 ':''}${s}</button>`;
    }).join('')||'<span style="color:var(--muted)">Sem vagas.</span>'}</div>
    ${Object.keys(smartHints).length?'<p style="font-size:12.5px;color:var(--muted);margin-bottom:6px">🌟 Encaixa bem na agenda do profissional naquele dia.</p>':''}
    ${book.duration>1?'<p style="font-size:12.5px;color:var(--muted);margin-bottom:18px">Horários acinzentados não cabem a duração escolhida.</p>':'<div style="margin-bottom:18px"></div>'}
    <div class="section-title">Dados do consultório</div>
    <div class="field"><label>Nome do consultório *</label><input id="bkName" placeholder="Clínica Sorriso"></div>
    <div class="row2"><div class="field"><label>Responsável</label><input id="bkResp" placeholder="Dr. João"></div>
      <div class="field"><label>Telefone</label><input id="bkPhone" placeholder="(11) 90000-0000"></div></div>
    <div class="field"><label>E-mail</label><input id="bkEmail" type="email" placeholder="contato@consultorio.com"></div>
    <div class="field"><label>Endereço do consultório * — onde será o atendimento</label><input id="bkAddr" placeholder="Rua, nº, complemento, bairro, cidade"></div>
    <div class="field"><label>Procedimento</label><select id="bkProc">${PROCEDURES.map(p=>`<option>${p}</option>`).join('')}</select></div>

    <div class="section-title" style="margin-top:14px">Dados do paciente</div>
    <div class="field"><label>Nome do paciente *</label><input id="bkPatName" placeholder="João Silva"></div>
    <div class="field"><label>WhatsApp do paciente</label><input id="bkPatPhone" type="tel" placeholder="(11) 99999-9999" inputmode="tel">
      <p style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4">📱 Ao confirmar, o EndoDoc envia 1 mensagem no WhatsApp do paciente com a anamnese pré-consulta. Marque vazio se não quiser enviar.</p>
    </div>

    <div class="field"><label>Observações * — breve relato do caso</label><textarea id="bkNotes" placeholder="Ex.: Tratamento de canal no dente 36, dor há 3 dias, sensibilidade ao frio."></textarea></div>
    <div class="field"><label>Documento (opcional) — exame, raio-x, encaminhamento</label><input type="file" id="bkFile" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx"></div>
    <div style="display:flex;gap:10px"><button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" id="bkConfirm" ${book.slots.length?'':'disabled'} onclick="confirmBooking()">Confirmar</button></div>`);
}
function changeDuration(v){
  book.duration=Math.max(1,Math.min(3,parseInt(v,10)||1));
  book.slots=[]; // reseta seleção quando muda duração
  renderBooking();
}
function pickSlot(start){
  const free=availMap[book.date]||[];
  const freeSet=new Set(free);
  const range=rangeFromStart(start, book.duration);
  if(!range.every(t=>freeSet.has(t))){ toast('Esses horários consecutivos não estão livres.','err'); return; }
  book.slots=range;
  // atualiza visual
  document.querySelectorAll('#modal .chips .chip').forEach(c=>{
    c.classList.toggle('sel', book.slots.includes(c.dataset.s));
  });
  const b=document.getElementById('bkConfirm'); if(b) b.disabled=false;
}
async function confirmBooking(){
  const name=document.getElementById('bkName').value.trim();
  if(!name){toast('Informe o nome do consultório.','err');return;}
  const addr=document.getElementById('bkAddr').value.trim();
  if(!addr){toast('Informe o endereço do consultório (onde será o atendimento).','err');return;}
  const patName=document.getElementById('bkPatName').value.trim();
  if(!patName){toast('Informe o nome do paciente.','err');return;}
  let patPhone=(document.getElementById('bkPatPhone').value||'').replace(/\D/g,'');
  if(patPhone && patPhone.length<10){toast('WhatsApp do paciente parece incompleto (DDD + número).','err');return;}
  if(patPhone && patPhone.length>11){toast('WhatsApp do paciente com mais dígitos que o esperado.','err');return;}
  const notes=document.getElementById('bkNotes').value.trim();
  if(!notes){toast('Preencha as observações sobre o caso.','err');return;}
  const btn=document.getElementById('bkConfirm');btn.disabled=true;btn.textContent='Confirmando…';
  let docPath=null;
  const fileInp=document.getElementById('bkFile');
  const file=fileInp&&fileInp.files&&fileInp.files[0];
  if(file){
    if(file.size>10*1024*1024){toast('Documento muito grande (máx. 10 MB).','err');btn.disabled=false;btn.textContent='Confirmar';return;}
    const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    docPath=prof.slug+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'-'+safe;
    const {error:upErr}=await sb.storage.from('documentos').upload(docPath,file,{upsert:false});
    if(upErr){toast('Erro ao enviar o documento: '+upErr.message,'err');btn.disabled=false;btn.textContent='Confirmar';return;}
  }
  // Geocodifica o endereço (não bloqueia se falhar — booking salva sem coords)
  let lat=null, lng=null;
  try{
    const r=await fetch(SUPA_URL+'/functions/v1/geocode-address',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({address:addr})
    });
    if(r.ok){ const j=await r.json(); lat=j.lat; lng=j.lng; }
  }catch(_){ /* silencia: salva sem coords */ }

  const {error}=await sb.rpc('create_booking_multi',{
    p_slug:prof.slug,p_date:book.date,p_times:book.slots,
    p_office_name:name,p_office_responsible:document.getElementById('bkResp').value.trim(),
    p_office_phone:document.getElementById('bkPhone').value.trim(),p_office_email:document.getElementById('bkEmail').value.trim(),
    p_office_address:addr,p_procedure:document.getElementById('bkProc').value,p_notes:notes,p_document_path:docPath,
    p_office_lat:lat, p_office_lng:lng,
    p_patient_name:patName, p_patient_phone:patPhone||null
  });
  if(error){
    toast(error.message,'err');
    await loadAvailability(); render(); // recarrega caso o horário tenha sido tomado
    closeModal();
    return;
  }
  // sucesso
  const d=book.date, slots=book.slots.slice();
  // remove os slots localmente
  availMap[d]=(availMap[d]||[]).filter(x=>!slots.includes(x));
  render();
  const fim = addHour(slots[slots.length-1], 1);
  const horarioStr = slots.length===1 ? `às ${slots[0]}` : `de ${slots[0]} às ${fim}`;
  openModal(`<div style="text-align:center"><div style="font-size:46px">✅</div>
    <h3 style="margin-top:6px">Agendamento confirmado!</h3>
    <p class="sub" style="margin-top:8px">${esc(name)}<br>${fmtLong(d)} ${horarioStr}<br>com ${esc(prof.name)}</p>
    <button class="btn btn-primary btn-block" onclick="closeModal()">Concluir</button></div>`);
}

init();
</script>
</body>
</html>
