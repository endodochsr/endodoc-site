    </div>
    <div id="histTotals" class="card" style="display:none"></div>
    <div id="histList"><div style="color:var(--muted);text-align:center;padding:20px;font-size:14px">Carregando…</div></div>`;
  loadHistorico();
}
async function loadHistorico(){
  const today=todayISO();
  const now=new Date();
  const since=new Date();
  if(histState.range==='30d') since.setDate(now.getDate()-30);
  else if(histState.range==='90d') since.setDate(now.getDate()-90);
  else if(histState.range==='1y') since.setFullYear(now.getFullYear()-1);
  else since.setFullYear(2020,0,1);
  const sinceISO=since.getFullYear()+'-'+String(since.getMonth()+1).padStart(2,'0')+'-'+String(since.getDate()).padStart(2,'0');

  let q = sb.from('bookings').select('*').gte('slot_date',sinceISO).order('slot_date',{ascending:false}).order('slot_time',{ascending:true});
  // realizadas = active E (slot_date < hoje OU completed_at marcado). canceladas = qualquer canceladas
  if(histState.status==='cancelled') q = q.eq('status','cancelled');
  else if(histState.status==='active') q = q.eq('status','active').lt('slot_date',today);
  else q = q.in('status',['active','cancelled']).lt('slot_date',today);

  const { data, error } = await q;
  if(error){ document.getElementById('histList').innerHTML='<div class="card" style="color:var(--danger)">Erro: '+esc(error.message)+'</div>'; return; }
  let list = data || [];

  // adiciona atendimentos de HOJE/FUTUROS que o dentista marcou como realizado
  // (active + completed_at) — não vêm na query acima por causa do .lt('slot_date', today)
  if(histState.status !== 'cancelled'){
    const { data:completed } = await sb.from('bookings').select('*').eq('status','active').not('completed_at','is',null).gte('slot_date',today);
    list = list.concat(completed||[]);
  }

  // adiciona cancelados futuros se status==all
  if(histState.status!=='active' && histState.status!=='cancelled'){
    const { data:future } = await sb.from('bookings').select('*').gte('slot_date',today).eq('status','cancelled').gte('slot_date',sinceISO).order('slot_date',{ascending:false});
    list = list.concat(future||[]);
  }
  // filtro de busca
  if(histState.search){
    const s = histState.search.toLowerCase();
    list = list.filter(b => (b.office_name||'').toLowerCase().includes(s));
  }
  // ordena de novo (mais recente primeiro)
  list.sort((a,b)=>{
    if(a.slot_date!==b.slot_date) return b.slot_date.localeCompare(a.slot_date);
    return a.slot_time.localeCompare(b.slot_time);
  });

  // totais agregados
  const realized = list.filter(b=>b.status==='active');
  const cancelled = list.filter(b=>b.status==='cancelled');
  const seenConsult = new Set();
  realized.forEach(b=>seenConsult.add(b.slot_date+'|'+b.office_name+'|'+(b.office_phone||'')));
  const totalHoras = realized.length;
  // soma real dos valores cobrados
  const totalFat = realized.reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const totalRecebido = realized.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const totalAReceber = totalFat - totalRecebido;
  const fmtBRL = v => 'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  const totEl = document.getElementById('histTotals');
  totEl.style.display='block';
  totEl.innerHTML = `<div class="stats-grid">
    <div class="stat"><div class="stat-label">Consultas realizadas</div><div class="stat-val">${seenConsult.size}</div></div>
    <div class="stat"><div class="stat-label">Horas atendidas</div><div class="stat-val">${totalHoras}h</div></div>
    ${totalFat>0?`<div class="stat"><div class="stat-label">Receita total</div><div class="stat-val">${fmtBRL(totalFat)}</div>${totalAReceber>0?`<div class="stat-sub">a receber: ${fmtBRL(totalAReceber)}</div>`:''}</div>`:''}
    <div class="stat"><div class="stat-label">Canceladas</div><div class="stat-val">${cancelled.length}</div></div>
  </div>`;

  // lista
  if(!list.length){
    document.getElementById('histList').innerHTML = `<div class="card empty-state">
      <div class="empty-ico">🗂️</div>
      <h3>Sem histórico no período</h3>
      <p>Ajuste o período acima ou aguarde: assim que você atender uma consulta, ela aparece aqui automaticamente.</p>
    </div>`;
    return;
  }
  // agrupa por (data, clínica, telefone) pra mostrar multi-slot como 1 linha
  const groups = groupBookings(list);
  const html = groups.map(g => {
    const first=g.bookings[0]; const last=g.bookings[g.bookings.length-1];
    const dur=g.bookings.length;
    const tStart=hhmm(first.slot_time);
    const tEnd=(()=>{const [h]=last.slot_time.split(':').map(Number);return String(h+1).padStart(2,'0')+':00';})();
    const horario = dur>1 ? `${tStart}–${tEnd}` : tStart;
    const isCancelled = first.status==='cancelled';
    const isCompleted = !isCancelled && !!first.completed_at;
    const parts=first.slot_date.split('-');const d=+parts[2],m=+parts[1],y=parts[0];
    const dataStr = `${d}/${String(m).padStart(2,'0')}/${y}`;
    const badge = isCancelled
      ? '<span class="hist-badge cancelled">Cancelada</span>'
      : (isCompleted ? '<span class="hist-badge done">Realizada ✓</span>' : '<span class="hist-badge done">Realizada</span>');
    // ícone discreto pra indicar que tem conteúdo extra (prontuário, anamnese, relatório)
    const hasNotes = !!first.clinical_notes;
    const extraIcon = isCancelled ? '' : `<span style="font-size:11px;color:var(--muted);margin-left:6px;opacity:.8" title="Ver detalhes completos">▸</span>`;
    return `<div class="hist-row ${isCancelled?'cancelled':''}" onclick="openHistoryDetail('${first.id}')" title="Clique pra ver detalhes completos">
      <div class="hist-date">
        <div class="hist-d">${dataStr}</div>
        <div class="hist-t">${horario}${dur>1?` <span style="color:var(--muted)">(${dur}h)</span>`:''}</div>
      </div>
      <div class="hist-main">
        <div class="hist-name">${esc(first.office_name)}${hasNotes?' <span style="font-size:11px;color:var(--primary);font-weight:600" title="Tem prontuário">📝</span>':''}</div>
        <div class="hist-meta">${esc(first.procedure||'—')}${first.office_responsible?' · '+esc(first.office_responsible):''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">${badge}${extraIcon}</div>
    </div>`;
  }).join('');
  document.getElementById('histList').innerHTML = `<div class="card" style="padding:8px">${html}</div>`;
}

let finState = { period: '30d' };
async function renderFinanceiro(){
  const body = document.getElementById('appBody');
  body.innerHTML = `<div class="page-head"><h1>Financeiro</h1><p>Receita real, ticket médio e quem é seu melhor cliente.</p></div>

async function loadFinanceiro(){
  const now = new Date();
  let sinceISO;
  if(finState.period==='month'){
    sinceISO = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  } else {
    const since = new Date();
    if(finState.period==='30d') since.setDate(now.getDate()-30);
    else if(finState.period==='90d') since.setDate(now.getDate()-90);
    else if(finState.period==='1y') since.setFullYear(now.getFullYear()-1);
    else since.setFullYear(2020,0,1);
    sinceISO = since.getFullYear()+'-'+String(since.getMonth()+1).padStart(2,'0')+'-'+String(since.getDate()).padStart(2,'0');
  }
  const today = todayISO();
  // realizadas: active com slot_date < hoje OU completed_at marcado
  const [pastQ, completedQ] = await Promise.all([
    sb.from('bookings').select('*').eq('status','active').gte('slot_date',sinceISO).lt('slot_date',today),
    sb.from('bookings').select('*').eq('status','active').not('completed_at','is',null).gte('slot_date',today)
  ]);
  let list = (pastQ.data||[]).concat(completedQ.data||[]);
  if(pastQ.error){ document.getElementById('finContent').innerHTML='<div class="card" style="color:var(--danger)">Erro: '+esc(pastQ.error.message)+'</div>'; return; }

  const fmtBRL = v => 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  const withValue = list.filter(b=>b.consultation_value);
  const totalReceita = list.reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const totalRecebido = list.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const totalAReceber = totalReceita - totalRecebido;
  const consultasComValor = withValue.length;
  const ticketMedio = consultasComValor>0 ? totalReceita/consultasComValor : 0;

  // Estado vazio se nenhum atendimento tem valor preenchido
  if(!totalReceita && !list.length){
    document.getElementById('finContent').innerHTML = `<div class="card empty-state">
      <div class="empty-ico">💰</div>
      <h3>Sem dados financeiros ainda</h3>
      <p>Conforme você for atendendo e preenchendo o valor cobrado em cada consulta, sua receita aparece aqui — separada por clínica, com tendência mês a mês.</p>
    </div>`;
    return;
  }
  if(!totalReceita){
    document.getElementById('finContent').innerHTML = `<div class="card empty-state">
      <div class="empty-ico">💰</div>
      <h3>Preencha o valor das consultas</h3>
      <p>Você tem ${list.length} consulta(s) no período mas nenhuma com valor cobrado. Vai em <a href="#" onclick="go('agenda');return false" style="color:var(--primary);font-weight:600">Agenda</a> ou <a href="#" onclick="go('historico');return false" style="color:var(--primary);font-weight:600">Histórico</a> e adiciona o valor de cada uma.</p>
    </div>`;
    return;
  }

  // Top clínicas
  const porClinica = {};
  list.forEach(b=>{
    if(!b.consultation_value) return;
    const k = b.office_name || 'Sem nome';
    if(!porClinica[k]) porClinica[k]={ name:k, count:0, total:0 };
    porClinica[k].count++;
    porClinica[k].total += Number(b.consultation_value||0);
  });
  const topClinicas = Object.values(porClinica).sort((a,b)=>b.total-a.total).slice(0,5);

  // Por procedimento
  const porProc = {};
  list.forEach(b=>{
    if(!b.consultation_value) return;
    const k = (b.procedure||'Não especificado').trim() || 'Não especificado';
    if(!porProc[k]) porProc[k]={ name:k, count:0, total:0 };
    porProc[k].count++;
    porProc[k].total += Number(b.consultation_value||0);
  });
  const topProcs = Object.values(porProc).sort((a,b)=>b.total-a.total).slice(0,5);

  // Receita por mês (últimos 6)
  const monthBuckets = {};
  list.forEach(b=>{
    if(!b.consultation_value) return;
    const k = (b.slot_date||'').slice(0,7); // YYYY-MM
    if(!monthBuckets[k]) monthBuckets[k]=0;
    monthBuckets[k] += Number(b.consultation_value||0);
  });
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    const k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][d.getMonth()];
    months.push({ key:k, label:lbl, value: monthBuckets[k]||0 });
  }
  const maxMonth = Math.max(...months.map(m=>m.value), 1);

  // Lista detalhada (mais recente primeiro)
  list.sort((a,b)=>{
    if(a.slot_date!==b.slot_date) return b.slot_date.localeCompare(a.slot_date);
    return (a.slot_time||'').localeCompare(b.slot_time||'');
  });

  document.getElementById('finContent').innerHTML = `
    <div class="stats-grid" style="margin-bottom:18px">
      <div class="stat"><div class="stat-label">Receita total</div><div class="stat-val">${fmtBRL(totalReceita)}</div><div class="stat-sub">${withValue.length} atendimento(s) com valor</div></div>
      <div class="stat"><div class="stat-label">Recebido</div><div class="stat-val" style="color:var(--success)">${fmtBRL(totalRecebido)}</div>${totalAReceber>0?`<div class="stat-sub" style="color:var(--accent-d)">a receber: ${fmtBRL(totalAReceber)}</div>`:'<div class="stat-sub">tudo pago ✓</div>'}</div>
      <div class="stat"><div class="stat-label">Ticket médio</div><div class="stat-val">${fmtBRL(ticketMedio)}</div></div>
      <div class="stat"><div class="stat-label">Sem valor preenchido</div><div class="stat-val" style="font-size:18px;color:${list.length-withValue.length>0?'var(--danger)':'var(--muted)'}">${list.length-withValue.length}</div>${list.length-withValue.length>0?'<div class="stat-sub">precisa preencher</div>':'<div class="stat-sub">tudo certo ✓</div>'}</div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="section-title" style="margin-bottom:16px">📈 Evolução mensal (últimos 6 meses)</div>
      <div class="fin-chart">
        ${months.map(m=>{
          const h = m.value>0 ? Math.max(6, Math.round((m.value/maxMonth)*140)) : 4;
          const isCurrent = m.key === todayISO().slice(0,7);
          return `<div class="fin-bar-col">
            <div class="fin-bar-val">${m.value>0?fmtBRL(m.value).replace('R$ ',''):''}</div>
            <div class="fin-bar ${isCurrent?'current':''}" style="height:${h}px" title="${fmtBRL(m.value)}"></div>
            <div class="fin-bar-lbl">${m.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="row2" style="margin-bottom:18px">
      <div class="card">
        <div class="section-title" style="margin-bottom:14px">🏆 Top clínicas (por receita)</div>
        ${topClinicas.length?topClinicas.map((c,i)=>{
          const pct = Math.round((c.total/totalReceita)*100);
          return `<div class="fin-rank">
            <div class="fin-rank-pos">${i+1}</div>
            <div class="fin-rank-info">
              <div class="fin-rank-name">${esc(c.name)}</div>
              <div class="fin-rank-bar"><div class="fin-rank-bar-fill" style="width:${pct}%"></div></div>
              <div class="fin-rank-meta">${c.count} consulta(s) · ${pct}% da receita</div>
            </div>
            <div class="fin-rank-val">${fmtBRL(c.total)}</div>
          </div>`;
        }).join(''):'<div style="color:var(--muted);text-align:center;padding:12px">Sem dados</div>'}
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:14px">🦷 Por procedimento</div>
        ${topProcs.length?topProcs.map((p,i)=>{
          const pct = Math.round((p.total/totalReceita)*100);
          return `<div class="fin-rank">
            <div class="fin-rank-pos">${i+1}</div>
            <div class="fin-rank-info">
              <div class="fin-rank-name">${esc(p.name)}</div>
              <div class="fin-rank-bar"><div class="fin-rank-bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
              <div class="fin-rank-meta">${p.count} consulta(s) · ${pct}% da receita</div>
            </div>
            <div class="fin-rank-val">${fmtBRL(p.total)}</div>
          </div>`;
        }).join(''):'<div style="color:var(--muted);text-align:center;padding:12px">Sem dados</div>'}
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:14px">📋 Atendimentos no período (${list.length})</div>
      <div class="fin-list">
        ${list.map(b=>{
          const [y,m,d] = (b.slot_date||'').split('-');
          const dataStr = `${d}/${m}/${y}`;
          const isPaid = b.payment_status==='paid';
          return `<div class="fin-row">
            <div class="fin-row-date">${dataStr}<span>${(b.slot_time||'').slice(0,5)}</span></div>
            <div class="fin-row-main">
              <div class="fin-row-clinic">${esc(b.office_name||'—')}</div>
              <div class="fin-row-proc">${esc(b.procedure||'—')}</div>
            </div>
            <div class="fin-row-value">
              ${b.consultation_value?`<b>${fmtBRL(b.consultation_value)}</b>`:`<span style="color:var(--muted);font-size:12px">sem valor</span>`}
              ${b.consultation_value?`<span class="fin-status ${isPaid?'paid':'pending'}" onclick="togglePaid('${b.id}',${isPaid?'false':'true'})" title="Clique pra alternar">${isPaid?'✓ pago':'⏳ pendente'}</span>`:''}
            </div>
            <button class="pill" onclick="openValueModal('${b.id}')" title="Editar valor">${b.consultation_value?'✏️':'+ Valor'}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}
async function togglePaid(bookingId, makePaid){
  const status = makePaid==='true' || makePaid===true ? 'paid' : 'pending';
  const paidAt = status==='paid' ? new Date().toISOString() : null;
  const { error } = await sb.from('bookings').update({ payment_status:status, paid_at:paidAt }).eq('id',bookingId);
  if(error){ toast('Erro: '+error.message,'err'); return; }
  toast(status==='paid'?'✓ Marcado como pago':'⏳ Marcado como pendente','ok');
  // Atualiza só a view atual
  if(document.getElementById('finContent')) loadFinanceiro();
  else if(document.getElementById('histList')) loadHistorico();
}
async function openValueModal(bookingId){
  const { data:bk } = await sb.from('bookings').select('id,consultation_value,office_name,slot_date,slot_time').eq('id',bookingId).maybeSingle();
  if(!bk){ toast('Erro ao carregar','err'); return; }
  const cur = bk.consultation_value || '';
  const html = `<h3>Valor cobrado</h3>
    <p class="sub">${esc(bk.office_name||'')} · ${(bk.slot_date||'').split('-').reverse().join('/')}</p>
    <div class="field" style="margin-top:14px">
      <label>Valor cobrado por esse atendimento (R$)</label>
      <input id="valIn" type="number" min="0" step="10" value="${cur}" placeholder="Ex.: 350" style="font-size:18px">
      <p style="font-size:12px;color:var(--muted);margin-top:4px">Esse valor entra no seu financeiro. Privado, só você vê.</p>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" onclick="saveValue('${bookingId}')">Salvar</button>
    </div>`;
  showModal(html);
  setTimeout(()=>document.getElementById('valIn')?.focus(), 100);
}
async function saveValue(bookingId){
  const raw = (document.getElementById('valIn')?.value||'').trim();
  const v = raw==='' ? null : Number(raw);
  if(raw!=='' && (isNaN(v)||v<0)){ toast('Valor inválido','err'); return; }
  const { error } = await sb.from('bookings').update({ consultation_value:v }).eq('id',bookingId);
  if(error){ toast('Erro: '+error.message,'err'); return; }
  closeModal();
  toast('✓ Valor salvo','ok');
  // Atualiza SÓ a view atualmente renderizada (não troca de tela)
  if(document.getElementById('finContent')) loadFinanceiro();
  else if(document.getElementById('histList')) loadHistorico();
  else if(document.querySelector('.cal-wrap')) renderAgenda();
}

function renderReschedule(){
  const s = rescheduleState;
  const fmt = d => d.split('-').reverse().join('/');
  const dur = s.dur;
  showModal(`<h3>Reagendar consulta</h3>
    <p class="sub">${esc(s.officeName)} · ${fmt(s.origDate)} ${s.origTimes[0]}${dur>1?' às '+addHourLocal(s.origTimes[dur-1],1):''} (${dur}h)</p>
    <div class="section-title">Escolha a nova data</div>
    ${renderMiniCal()}
    <div id="reSlots" style="margin-top:14px"></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" id="reConfirm" disabled onclick="confirmReschedule()">Confirmar nova data</button>
    </div>`);
}
function addHourLocal(t,n){
  const [h,m]=t.split(':').map(Number);
  const tot=h*60+m+n*60;
  return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function renderMiniCal(){
  const s=rescheduleState;
  const c=s.calRef;
  const y=c.getFullYear(),m=c.getMonth();
  const monthName=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'][m];
  const first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate();
  const dowH=['D','S','T','Q','Q','S','S'].map(d=>`<div class="mini-cal-dow">${d}</div>`).join('');
  const today=todayISO();
  let cells='';
  for(let i=0;i<start;i++) cells += '<div class="mini-cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const past=ds<today;
    const sel=ds===s.pickedDate;
    const istoday=ds===today;
    const cls=['mini-cal-day',past?'past':'',sel?'sel':'',istoday?'today':''].filter(Boolean).join(' ');
    const click=past?'':`onclick="pickRescheduleDate('${ds}')"`;
    cells += `<div class="${cls}" ${click}>${d}</div>`;
  }
  // padding final pra não sobrar incompleto
  const total=start+days; const pad=(7-total%7)%7;
  for(let i=0;i<pad;i++) cells += '<div class="mini-cal-day empty"></div>';
  return `<div class="mini-cal-head">
      <button onclick="reMoveMonth(-1)">‹</button>
      <div class="mini-cal-month">${monthName} ${y}</div>
      <button onclick="reMoveMonth(1)">›</button>
    </div>
    <div class="mini-cal">${dowH}</div>
    <div class="mini-cal" style="margin-top:5px">${cells}</div>`;
}
function reMoveMonth(n){
  rescheduleState.calRef.setMonth(rescheduleState.calRef.getMonth()+n);
  renderReschedule();
}
async function pickRescheduleDate(ds){
  rescheduleState.pickedDate=ds;
  renderReschedule();
  // carrega slots disponíveis pra essa data (excluindo as próprias reservas se for mesma data)
  const slotsEl=document.getElementById('reSlots');
  slotsEl.innerHTML='<div style="color:var(--muted);font-size:13px">Carregando horários…</div>';
  const { data, error } = await sb.rpc('get_availability',{p_slug:currentProf.slug,p_from:ds,p_to:ds});
  if(error){ slotsEl.innerHTML='<div style="color:var(--danger);font-size:13px">Erro: '+esc(error.message)+'</div>'; return; }
  let avail=(data||[]).map(r=>r.slot_time.slice(0,5));
  // se for a MESMA data da reserva original, adiciona os slots originais (estão "ocupados por si mesmos")
  if(ds===rescheduleState.origDate){
    rescheduleState.origTimes.forEach(t=>{ if(!avail.includes(t)) avail.push(t); });
    avail.sort();
  }
  const dur=rescheduleState.dur;
  if(!avail.length){
    slotsEl.innerHTML='<div style="color:var(--muted);font-size:13.5px">Nenhum horário aberto nessa data.</div>';
    return;
  }
  const set=new Set(avail);
  const chips = avail.map(t=>{
    // pra durar `dur` horas, precisa de t, t+1, ..., t+(dur-1) todos disponíveis
    let fits=true;
    for(let i=0;i<dur;i++){ if(!set.has(addHourLocal(t,i))){ fits=false; break; } }
    if(!fits) return `<button class="chip no-fit" disabled>${t}</button>`;
    return `<button class="chip" onclick="pickRescheduleTime('${t}')" data-t="${t}">${t}</button>`;
  }).join('');
  slotsEl.innerHTML = `<div class="section-title">Novo horário inicial${dur>1?` (a consulta dura ${dur}h)`:''}</div>
    <div class="chips">${chips}</div>`;
}
function pickRescheduleTime(t){
  rescheduleState.pickedTime=t;
  document.querySelectorAll('#reSlots .chip').forEach(c=>c.classList.toggle('sel', c.dataset.t===t));
  const b=document.getElementById('reConfirm'); if(b) b.disabled=false;
}
async function confirmReschedule(){
  const s=rescheduleState;
  if(!s.pickedDate || !s.pickedTime){ toast('Escolha a nova data e horário','err'); return; }
  const btn=document.getElementById('reConfirm'); btn.disabled=true; btn.textContent='Reagendando…';
  const { error } = await sb.rpc('reschedule_booking_group',{
    p_ids: s.ids, p_new_date: s.pickedDate, p_new_start: s.pickedTime
  });
  if(error){ toast('Erro: '+error.message,'err'); btn.disabled=false; btn.textContent='Confirmar nova data'; return; }
  toast('Reagendado! Clínica avisada por e-mail.','ok');
  closeModal(); renderAgenda();
}
document.addEventListener('click', e=>{
  const ov=document.getElementById('overlay');
  if(ov && e.target===ov) closeModal();
});
async function downloadDoc(encPath){
  const path=decodeURIComponent(encPath);
  const {data,error}=await sb.storage.from('documentos').createSignedUrl(path,120);
  if(error){toast('Não consegui abrir o documento: '+error.message,'err');return;}
  window.open(data.signedUrl,'_blank');
}

boot();
</script>
<script src="/js/meta-pixel-cookies.js" defer></script>
