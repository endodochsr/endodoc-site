<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EndoDoc — Painel do profissional</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4f7f7;--surface:#fff;--surface-2:#f0f5f4;--ink:#16302f;--muted:#5e706f;--primary:#0e7c7b;--primary-d:#0a5d5c;--primary-soft:#e3f1f0;--accent:#c2a063;--success:#2e7d57;--success-soft:#e4f3ec;--danger:#c0492f;--danger-soft:#fbeae6;--border:#e4ecec;--shadow:0 1px 2px rgba(16,48,47,.04),0 8px 24px rgba(16,48,47,.06);--shadow-lg:0 12px 40px rgba(16,48,47,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:15px}
  .logo{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo .mark{width:38px;height:38px;border-radius:11px;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:20px;box-shadow:0 6px 16px rgba(14,124,123,.3)}
  .logo .name{font-size:18px;line-height:1.1}
  .logo .name small{display:block;font-size:11px;font-weight:500;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:600;font-size:15px;transition:.15s}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(14,124,123,.25)}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:var(--surface-2);color:var(--ink)}
  .btn-sm{padding:8px 14px;font-size:13.5px;border-radius:10px}
  .btn-block{width:100%}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .field input:disabled{background:var(--surface-2);color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* auth */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{width:100%;max-width:410px;background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:30px}
  .tabs{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:12px;margin:20px 0 22px}
  .tabs button{flex:1;padding:10px;border-radius:9px;font-weight:600;font-size:14px;color:var(--muted)}
  .tabs button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .msg{font-size:13.5px;padding:10px 13px;border-radius:10px;margin-bottom:14px;display:none}
  .msg.err{display:block;background:var(--danger-soft);color:var(--danger)}
  .msg.ok{display:block;background:var(--success-soft);color:var(--success)}
  /* app */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:64px;gap:10px}
  .topbar nav{display:flex;gap:4px}
  .topbar nav button{padding:9px 14px;border-radius:10px;font-weight:600;font-size:14px;color:var(--muted)}
  .topbar nav button:hover{background:var(--surface-2);color:var(--ink)}
  .topbar nav button.active{background:var(--primary-soft);color:var(--primary-d)}
  .userchip{display:flex;align-items:center;gap:10px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700}
  .container{max-width:840px;margin:0 auto;padding:28px 22px 70px}
  .page-head{margin-bottom:18px}
  .page-head h1{font-size:26px}.page-head p{color:var(--muted);margin-top:4px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .hint{background:var(--primary-soft);border:1px solid #cfe6e4;color:var(--primary-d);padding:12px 16px;border-radius:12px;font-size:13.5px}
  .hint.gold{background:#f7eed9;border-color:#ecdcb4;color:#8a6d27}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
  .linkbox{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px dashed var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:var(--primary-d);word-break:break-all}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:10px 16px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:14px;transition:.12s;color:var(--ink)}
  .chip:hover{border-color:var(--primary)}
  .chip.on{background:var(--success-soft);border-color:var(--success);color:var(--success)}
  .chip.locked{background:#fafcfc;color:#b9c6c5;border-color:#eef3f3;cursor:not-allowed}
  .chip[data-d].on{background:var(--success-soft);border-color:var(--success);color:var(--success)}
  .bk-card{border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;background:var(--surface);box-shadow:var(--shadow)}
  .bk-head{display:flex;align-items:flex-start;gap:14px}
  .bk-date{width:56px;text-align:center;flex-shrink:0;background:var(--surface-2);border-radius:10px;padding:8px 0}
  .bk-date .d{font-family:'Fraunces',serif;font-size:22px;line-height:1}
  .bk-date .m{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .bk-t{font-weight:700}
  .bk-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .bk-line{font-size:14px;margin-top:10px}
  .bk-notes{background:var(--surface-2);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:10px}
  .bk-map{width:100%;height:180px;border:0;border-radius:10px;margin-top:10px;background:var(--surface-2)}
  .bk-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 12px;border-radius:9px;background:var(--surface-2);color:var(--ink);text-decoration:none;border:none;cursor:pointer}
  .pill.dl{background:var(--primary-soft);color:var(--primary-d)}
  .pill.cancel{background:var(--danger-soft);color:var(--danger);margin-left:auto}
  .slugrow{display:flex;align-items:center;gap:2px;border:1.5px solid var(--border);border-radius:12px;padding:0 12px;background:var(--surface)}
  .slugrow:focus-within{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .slugpre{color:var(--muted);font-size:14px;white-space:nowrap}
  .slugrow input{border:none!important;padding:12px 2px!important;box-shadow:none!important;flex:1;background:transparent}
  .slugrow input:focus{outline:none;box-shadow:none!important;border:none!important}
  .hidden{display:none!important}
  .center-load{min-height:100vh;display:grid;place-items:center;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{background:#1f5d4b}.toast.err{background:#9c3a25}
  @media(max-width:640px){.topbar nav button{padding:8px 10px;font-size:13px}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading" class="center-load">Carregando…</div>

<!-- AUTH -->
<div id="authView" class="auth-wrap hidden">
  <div class="auth-card">
    <div class="logo"><div class="mark">E</div><div class="name">EndoDoc<small>Acesso do profissional</small></div></div>
    <div class="tabs">
      <button id="tabLogin" class="active" onclick="switchTab('login')">Entrar</button>
      <button id="tabReg" onclick="switchTab('reg')">Criar conta</button>
    </div>
    <div id="msg" class="msg"></div>
    <form id="formLogin" onsubmit="return doLogin(event)">
      <div class="field"><label>E-mail</label><input type="email" id="loginEmail" required></div>
      <div class="field"><label>Senha</label><input type="password" id="loginPass" required></div>
      <button class="btn btn-primary btn-block" type="submit" id="loginBtn">Entrar</button>
    </form>
    <form id="formReg" class="hidden" onsubmit="return doRegister(event)">
      <div class="field"><label>Seu nome</label><input id="regName" placeholder="Dra. Marina Alves" required></div>
      <div class="row2">
        <div class="field"><label>Especialidade</label><input id="regSpec" value="Endodontia" required></div>
        <div class="field"><label>Telefone</label><input id="regPhone" placeholder="(11) 90000-0000"></div>
      </div>
      <div class="field"><label>E-mail</label><input type="email" id="regEmail" required></div>
      <div class="field"><label>Senha (mín. 6)</label><input type="password" id="regPass" required minlength="6"></div>
      <button class="btn btn-primary btn-block" type="submit" id="regBtn">Começar teste grátis</button>
      <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:12px">14 dias grátis · sem cartão</p>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="logo"><div class="mark">E</div><div class="name">EndoDoc</div></div>
    <nav id="appNav">
      <button data-v="visao" class="active" onclick="go('visao')">Visão geral</button>
      <button data-v="agenda" onclick="go('agenda')">Agenda</button>
      <button data-v="dispo" onclick="go('dispo')">Disponibilidade</button>
      <button data-v="perfil" onclick="go('perfil')">Perfil</button>
    </nav>
    <div class="userchip"><div class="avatar" id="avatar">D</div><button class="btn btn-ghost btn-sm" onclick="doLogout()">Sair</button></div>
  </div>
  <div class="container" id="appBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ===== CONFIG (chaves públicas) ===== */
const SUPA_URL = 'https://tuolwdniugjwbepujqoy.supabase.co';
const SUPA_KEY = 'sb_publishable_NwPGO0Ntxu92Lr_CkdMtvg_Je__gZMr';
let sb = null;

const SLOTS=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let currentProf=null, appView='visao', dispoDate=todayISO();

/* ===== Google Calendar ===== */
const GOOGLE_CLIENT_ID='907559413522-b63p3o7nlmtb052voa98rf7bjogjdt0n.apps.googleusercontent.com';
const GOOGLE_REDIRECT='https://www.endodoc.com.br/google-callback';
const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.events';

/* ===== helpers ===== */
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function val(id){return document.getElementById(id).value.trim();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayISO(){const d=new Date();d.setHours(0,0,0,0);return iso(d);}
function hhmm(t){return (t||'').slice(0,5);}
function msg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+(type||'');}
function clearMsg(){const m=document.getElementById('msg');m.className='msg';m.textContent='';}
let tT;function toast(t,type){const e=document.getElementById('toast');e.textContent=(type==='ok'?'✓ ':type==='err'?'⚠ ':'')+t;e.className='toast show '+(type||'');clearTimeout(tT);tT=setTimeout(()=>e.className='toast',2600);}

function switchTab(t){
  document.getElementById('tabLogin').classList.toggle('active',t==='login');
  document.getElementById('tabReg').classList.toggle('active',t==='reg');
  document.getElementById('formLogin').classList.toggle('hidden',t!=='login');
  document.getElementById('formReg').classList.toggle('hidden',t!=='reg');
  clearMsg();
}

/* ===== boot ===== */
async function boot(){
  try{
    if(!window.supabase || !window.supabase.createClient){
      hide('loading'); show('authView');
      msg('Não consegui carregar a biblioteca do Supabase. Recarregue (Cmd+Shift+R) e abra no Google Chrome.','err'); return;
    }
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data:{ session } } = await sb.auth.getSession();
    hide('loading');
    if(session){ await openApp(); } else { show('authView'); }
  }catch(err){ hide('loading'); show('authView'); msg('Erro ao iniciar: '+((err&&err.message)||err),'err'); }
}

/* ===== auth ===== */
async function doRegister(e){
  e.preventDefault(); clearMsg();
  const btn=document.getElementById('regBtn'); btn.disabled=true; btn.textContent='Criando…';
  try{
    const email=val('regEmail').toLowerCase(), pass=document.getElementById('regPass').value;
    const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ name:val('regName'), specialty:val('regSpec')||'Endodontia', phone:val('regPhone') } } });
    if(error) throw error;
    if(!data.session){ msg('Conta criada! Confirme pelo link no seu e-mail e depois faça login.','ok'); btn.disabled=false; btn.textContent='Começar teste grátis'; return false; }
    await openApp();
  }catch(err){ msg(traduz(err),'err'); btn.disabled=false; btn.textContent='Começar teste grátis'; }
  return false;
}
async function doLogin(e){
  e.preventDefault(); clearMsg();
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Entrando…';
  try{
    const { error } = await sb.auth.signInWithPassword({ email:val('loginEmail').toLowerCase(), password:document.getElementById('loginPass').value });
    if(error) throw error;
    await openApp();
  }catch(err){ msg(traduz(err),'err'); btn.disabled=false; btn.textContent='Entrar'; }
  return false;
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }
function traduz(err){const m=(err&&err.message)||'Algo deu errado';
  if(/already registered|already exists/i.test(m))return 'Já existe uma conta com esse e-mail. Tente entrar.';
  if(/Invalid login credentials/i.test(m))return 'E-mail ou senha incorretos.';
  if(/Email not confirmed/i.test(m))return 'Confirme seu e-mail (link enviado) antes de entrar.';
  if(/Password should be at least/i.test(m))return 'A senha precisa ter ao menos 6 caracteres.';
  return m;}

/* ===== app shell ===== */
async function openApp(){
  hide('authView');
  let { data:prof } = await sb.from('professionals').select('*').maybeSingle();
  if(!prof){ // fallback: cria se a trigger não tiver criado
    const { data:{ user } } = await sb.auth.getUser();
    if(user){ await sb.from('professionals').insert({ id:user.id, slug:'prof-'+user.id.slice(0,8), name:user.user_metadata?.name||'Profissional', specialty:user.user_metadata?.specialty||'Endodontia', phone:user.user_metadata?.phone||null }); const r=await sb.from('professionals').select('*').maybeSingle(); prof=r.data; }
  }
  currentProf=prof;
  setAvatar();
  show('appView');
  go('visao');
  handleGoogleReturn();
}
function handleGoogleReturn(){
  const g=new URLSearchParams(location.search).get('google');
  if(!g) return;
  if(g==='ok') toast('Google conectado com sucesso!','ok');
  else if(g==='expirado') toast('A conexão expirou. Tente de novo.','err');
  else toast('Não foi possível conectar o Google.','err');
  history.replaceState(null,'',location.pathname);
}
function setAvatar(){ document.getElementById('avatar').textContent=((currentProf&&currentProf.name)||'D').replace(/^Dr[a]?\.\s*/i,'')[0].toUpperCase(); }
function go(v){
  appView=v;
  document.querySelectorAll('#appNav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  const body=document.getElementById('appBody');
  if(v==='visao') body.innerHTML=viewVisao();
  else if(v==='perfil') body.innerHTML=viewPerfil();
  else if(v==='agenda'){ body.innerHTML='<div class="page-head"><h1>Agenda</h1><p>Carregando…</p></div>'; renderAgenda(); }
  else if(v==='dispo'){ body.innerHTML=dispoShell(); loadDispoSlots(); }
}

/* ===== visão geral ===== */
function viewVisao(){
  const p=currentProf||{};
  const trialDays=p.trial_ends_at?Math.max(0,Math.ceil((new Date(p.trial_ends_at)-new Date())/86400000)):0;
  const link='endodoc.com.br/'+(p.slug||'');
  const status = p.subscription_status==='active'
    ? `<div class="hint">✓ Assinatura ativa.</div>`
    : `<div class="hint gold">⏳ Teste grátis — faltam <b>${trialDays} dia(s)</b>.</div>`;
  return `<div class="page-head"><h1>Olá, ${esc(p.name||'')} 👋</h1><p>Bem-vindo(a) ao seu painel.</p></div>
    <div style="margin-top:14px">${status}</div>
    <div class="card">
      <div class="section-title">Seu link de agendamento</div>
      <div class="linkbox"><span style="flex:1">🔗 ${link}</span>
        <button class="btn btn-ghost btn-sm" onclick="copyLink('${link}')">Copiar</button></div>
      <p style="font-size:13px;color:var(--muted);margin-top:10px">Defina seus horários na aba <b>Disponibilidade</b> para os consultórios poderem agendar por esse link.</p>
    </div>
    <div class="card">
      <div class="section-title">Google Calendar</div>
      ${googleCard(p)}
    </div>`;
}
function googleCard(p){
  if(p.google_connected){
    return `<div class="hint">✓ Conectado${p.google_email?(' como <b>'+esc(p.google_email)+'</b>'):''}. Sua agenda sincroniza com o Google.</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="disconnectGoogle()">Desconectar Google</button>`;
  }
  return `<p style="font-size:14px;color:var(--muted)">Conecte sua conta do Google para os atendimentos entrarem na sua agenda e seus compromissos do Google bloquearem horários automaticamente.</p>
    <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="connectGoogle()">Conectar Google</button>`;
}
function connectGoogle(){
  const state=(crypto.randomUUID?crypto.randomUUID():(''+Math.random()).slice(2)+Date.now());
  localStorage.setItem('endodoc_gstate', state);
  const u='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:GOOGLE_CLIENT_ID, redirect_uri:GOOGLE_REDIRECT, response_type:'code',
    scope:GOOGLE_SCOPE, access_type:'offline', prompt:'consent', include_granted_scopes:'true', state
  }).toString();
  location.href=u;
}
async function disconnectGoogle(){
  if(!confirm('Desconectar sua conta do Google? Os atendimentos param de sincronizar com a sua agenda.')) return;
  const { error } = await sb.rpc('google_disconnect');
  if(error){ toast(error.message,'err'); return; }
  currentProf.google_connected=false; currentProf.google_email=null;
  toast('Google desconectado','ok'); go('visao');
}
function copyLink(u){navigator.clipboard?.writeText('https://'+u);toast('Link copiado!','ok');}

/* ===== disponibilidade ===== */
function dispoShell(){
  return `<div class="page-head"><h1>Disponibilidade</h1><p>Defina os dias e horários que você abre para agendamento.</p></div>
  <div class="hint" style="margin-top:14px">Horários já reservados ficam bloqueados (🔒) e não podem ser removidos sem cancelar o agendamento.</div>
  <div class="card">
    <div class="section-title">Editar um dia</div>
    <div class="field" style="max-width:220px"><label>Data</label><input type="date" id="dispoDateInp" value="${dispoDate}" min="${todayISO()}" onchange="setDispoDate(this.value)"></div>
    <div id="dispoSlots" class="chips"><span style="color:var(--muted);font-size:14px">Carregando…</span></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-ghost btn-sm" onclick="dispoAll(true)">Marcar todos</button>
      <button class="btn btn-ghost btn-sm" onclick="dispoAll(false)">Limpar livres</button>
    </div>
  </div>
  <div class="card">
    <div class="section-title">Abrir vários dias de uma vez</div>
    <div class="row2">
      <div class="field"><label>De</label><input type="date" id="recFrom" value="${todayISO()}"></div>
      <div class="field"><label>Até</label><input type="date" id="recTo"></div>
    </div>
    <div class="section-title" style="margin-top:6px">Dias da semana</div>
    <div class="chips" id="recDows">
      ${[1,2,3,4,5].map(i=>`<button class="chip on" data-d="${i}" onclick="this.classList.toggle('on')">${DOW[i]}</button>`).join('')}
      ${[6,0].map(i=>`<button class="chip" data-d="${i}" onclick="this.classList.toggle('on')">${DOW[i]}</button>`).join('')}
    </div>
    <button class="btn btn-primary" style="margin-top:18px" onclick="applyRecurring()">Aplicar período (horários padrão)</button>
  </div>`;
}
function setDispoDate(v){dispoDate=v;loadDispoSlots();}
async function loadDispoSlots(){
  const cont=document.getElementById('dispoSlots'); if(!cont) return;
  const [{data:av},{data:bk}] = await Promise.all([
    sb.from('availability').select('slot_time').eq('slot_date',dispoDate),
    sb.from('bookings').select('slot_time').eq('slot_date',dispoDate).eq('status','active')
  ]);
  const availSet=new Set((av||[]).map(r=>hhmm(r.slot_time)));
  const bookedSet=new Set((bk||[]).map(r=>hhmm(r.slot_time)));
  cont.innerHTML=SLOTS.map(s=>{
    if(bookedSet.has(s)) return `<button class="chip locked" disabled>${s} 🔒</button>`;
    return `<button class="chip ${availSet.has(s)?'on':''}" onclick="toggleSlot('${s}')">${s}</button>`;
  }).join('');
}
async function toggleSlot(s){
  const { data:ex } = await sb.from('availability').select('id').eq('slot_date',dispoDate).eq('slot_time',s);
  if(ex&&ex.length){ await sb.from('availability').delete().eq('slot_date',dispoDate).eq('slot_time',s); }
  else { const{error}=await sb.from('availability').insert({professional_id:currentProf.id,slot_date:dispoDate,slot_time:s}); if(error){toast(error.message,'err');return;} }
  await loadDispoSlots();
}
async function dispoAll(on){
  if(on){
    const rows=SLOTS.map(s=>({professional_id:currentProf.id,slot_date:dispoDate,slot_time:s}));
    const{error}=await sb.from('availability').upsert(rows,{onConflict:'professional_id,slot_date,slot_time',ignoreDuplicates:true});
    if(error){toast(error.message,'err');return;}
  }else{
    const{data:bk}=await sb.from('bookings').select('slot_time').eq('slot_date',dispoDate).eq('status','active');
    const booked=new Set((bk||[]).map(r=>hhmm(r.slot_time)));
    const toDel=SLOTS.filter(s=>!booked.has(s));
    await sb.from('availability').delete().eq('slot_date',dispoDate).in('slot_time',toDel);
  }
  await loadDispoSlots(); toast('Disponibilidade atualizada','ok');
}
async function applyRecurring(){
  const from=val('recFrom'),to=val('recTo');
  if(!from||!to||to<from){toast('Defina um período válido','err');return;}
  const dows=[...document.querySelectorAll('#recDows .chip.on')].map(c=>+c.dataset.d);
  if(!dows.length){toast('Escolha ao menos um dia da semana','err');return;}
  let d=new Date(from+'T00:00:00'),end=new Date(to+'T00:00:00');const rows=[];let dias=0;
  while(d<=end){ if(dows.includes(d.getDay())){const ds=iso(d);SLOTS.forEach(s=>rows.push({professional_id:currentProf.id,slot_date:ds,slot_time:s}));dias++;} d.setDate(d.getDate()+1);}
  if(!rows.length){toast('Nenhum dia no período','err');return;}
  const{error}=await sb.from('availability').upsert(rows,{onConflict:'professional_id,slot_date,slot_time',ignoreDuplicates:true});
  if(error){toast(error.message,'err');return;}
  toast(dias+' dia(s) abertos','ok'); loadDispoSlots();
}

/* ===== perfil ===== */
function viewPerfil(){
  const p=currentProf||{};
  const slug=esc(p.slug||'');
  let linkBlock;
  if(p.slug_changed){
    linkBlock=`<div class="field"><label>Seu link (personalizado)</label><input value="endodoc.com.br/${slug}" disabled></div>
      <p style="font-size:12.5px;color:var(--muted);margin-top:-6px">O link já foi personalizado e não pode mais ser alterado.</p>`;
  } else {
    linkBlock=`<div class="field"><label>Endereço do seu link</label>
        <div class="slugrow"><span class="slugpre">endodoc.com.br/</span><input id="pfSlug" value="${slug}" placeholder="dra-marina" autocapitalize="off" autocorrect="off"></div></div>
      <div class="hint gold">Você pode personalizar o seu link <b>uma única vez</b>. Depois ele fica fixo, porque os consultórios já vão ter esse endereço salvo. Use letras, números e hífen (ex.: <b>dra-marina</b>).</div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="changeSlug()">Salvar meu link</button>`;
  }
  return `<div class="page-head"><h1>Meu perfil</h1><p>Seus dados de profissional.</p></div>
  <div class="card" style="max-width:560px">
    <div class="field"><label>Nome</label><input id="pfName" value="${esc(p.name||'')}"></div>
    <div class="row2">
      <div class="field"><label>Especialidade</label><input id="pfSpec" value="${esc(p.specialty||'')}"></div>
      <div class="field"><label>Telefone</label><input id="pfPhone" value="${esc(p.phone||'')}"></div>
    </div>
    <button class="btn btn-primary" onclick="saveProfile()">Salvar alterações</button>
  </div>
  <div class="card" style="max-width:560px">
    <div class="section-title">Link de agendamento</div>
    ${linkBlock}
  </div>`;
}
async function saveProfile(){
  const name=val('pfName'),spec=val('pfSpec'),phone=val('pfPhone');
  const{error}=await sb.from('professionals').update({name,specialty:spec,phone}).eq('id',currentProf.id);
  if(error){toast(error.message,'err');return;}
  currentProf.name=name;currentProf.specialty=spec;currentProf.phone=phone;
  setAvatar(); toast('Perfil atualizado','ok');
}
async function changeSlug(){
  const raw=val('pfSlug');
  if(!raw){ toast('Digite o novo link','err'); return; }
  if(!confirm('Você só pode personalizar o seu link UMA vez.\n\nDefinir como:\nendodoc.com.br/'+raw+'\n\nDepois disso não será possível mudar. Confirmar?')) return;
  const { data, error } = await sb.rpc('change_my_slug',{ p_new_slug: raw });
  if(error){ toast((error.message||'Não foi possível alterar o link'),'err'); return; }
  currentProf.slug=data; currentProf.slug_changed=true;
  toast('Link personalizado com sucesso!','ok');
  go('perfil');
}

/* ===== agenda ===== */
const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
async function renderAgenda(){
  const body=document.getElementById('appBody');
  const {data,error}=await sb.from('bookings').select('*').eq('status','active').gte('slot_date',todayISO()).order('slot_date',{ascending:true}).order('slot_time',{ascending:true});
  if(error){body.innerHTML='<div class="page-head"><h1>Agenda</h1></div><div class="card">Erro: '+esc(error.message)+'</div>';return;}
  const list=data||[];
  const cards=list.map(b=>{
    const parts=b.slot_date.split('-');const d=+parts[2],m=+parts[1];
    const q=encodeURIComponent(b.office_address||'');
    return `<div class="bk-card">
      <div class="bk-head">
        <div class="bk-date"><div class="d">${d}</div><div class="m">${MES[m-1]}</div></div>
        <div style="flex:1;min-width:0">
          <div class="bk-t">${hhmm(b.slot_time)} — ${esc(b.office_name)}</div>
          <div class="bk-sub">${esc(b.office_responsible||'')}${b.office_phone?' · '+esc(b.office_phone):''}${b.procedure?' · '+esc(b.procedure):''}</div>
        </div>
        <button class="pill cancel" onclick="cancelBk('${b.id}')">Cancelar</button>
      </div>
      <div class="bk-line">📍 ${esc(b.office_address||'—')}</div>
      ${b.office_address?`<iframe class="bk-map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=${q}&z=16&output=embed"></iframe>`:''}
      <div class="bk-notes">📝 ${esc(b.notes||'—')}</div>
      <div class="bk-actions">
        ${b.office_address?`<a class="pill" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${q}">🗺️ Como chegar</a>`:''}
        ${b.document_path?`<button class="pill dl" onclick="downloadDoc('${encodeURIComponent(b.document_path)}')">📎 Baixar documento</button>`:''}
      </div>
    </div>`;
  }).join('');
  body.innerHTML=`<div class="page-head"><h1>Agenda</h1><p>Seus próximos atendimentos (${list.length}).</p></div>`+
    (list.length?cards:'<div class="card" style="text-align:center;color:var(--muted)">Nenhum atendimento futuro ainda. Compartilhe seu link de agendamento!</div>');
}
async function cancelBk(id){
  if(!confirm('Cancelar este atendimento? O horário será liberado para novos agendamentos.'))return;
  const {error}=await sb.from('bookings').update({status:'cancelled'}).eq('id',id);
  if(error){toast(error.message,'err');return;}
  toast('Atendimento cancelado.','ok'); renderAgenda();
}
async function downloadDoc(encPath){
  const path=decodeURIComponent(encPath);
  const {data,error}=await sb.storage.from('documentos').createSignedUrl(path,120);
  if(error){toast('Não consegui abrir o documento: '+error.message,'err');return;}
  window.open(data.signedUrl,'_blank');
}

boot();
</script>
