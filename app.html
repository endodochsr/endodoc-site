<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EndoDoc — Painel do profissional</title>
<link rel="icon" href="/brand/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/brand/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
<link rel="manifest" href="/brand/site.webmanifest" />
<meta name="theme-color" content="#0a5d5c" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4f7f7;--surface:#fff;--surface-2:#f0f5f4;--ink:#16302f;--muted:#5e706f;--primary:#0e7c7b;--primary-d:#0a5d5c;--primary-soft:#e3f1f0;--accent:#c2a063;--success:#2e7d57;--success-soft:#e4f3ec;--danger:#c0492f;--danger-soft:#fbeae6;--border:#e4ecec;--shadow:0 1px 2px rgba(16,48,47,.04),0 8px 24px rgba(16,48,47,.06);--shadow-lg:0 12px 40px rgba(16,48,47,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:15px}
  .logo{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo .mark{width:80px;height:80px;display:block;object-fit:contain;margin:-18px -6px}
  .logo .name{font-size:18px;line-height:1.1}
  .logo .name small{display:block;font-size:11px;font-weight:500;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:600;font-size:15px;transition:.15s}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(14,124,123,.25)}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:var(--surface-2);color:var(--ink)}
  .btn-sm{padding:8px 14px;font-size:13.5px;border-radius:10px}
  .btn-block{width:100%}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:15px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .field input:disabled,.field select:disabled,.field textarea:disabled{background:var(--surface-2);color:var(--muted)}
  .field textarea{resize:vertical;min-height:110px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* auth */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{width:100%;max-width:410px;background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:30px}
  .tabs{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:12px;margin:20px 0 22px}
  .tabs button{flex:1;padding:10px;border-radius:9px;font-weight:600;font-size:14px;color:var(--muted)}
  .tabs button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .msg{font-size:13.5px;padding:10px 13px;border-radius:10px;margin-bottom:14px;display:none}
  .msg.err{display:block;background:var(--danger-soft);color:var(--danger)}
  .msg.ok{display:block;background:var(--success-soft);color:var(--success)}
  /* app */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:64px;gap:10px}
  .topbar nav{display:flex;gap:4px}
  .topbar nav button{padding:9px 14px;border-radius:10px;font-weight:600;font-size:14px;color:var(--muted)}
  .topbar nav button:hover{background:var(--surface-2);color:var(--ink)}
  .topbar nav button.active{background:var(--primary-soft);color:var(--primary-d)}
  .topbar nav button{position:relative}
  .nav-badge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;background:var(--accent);color:#fff;border-radius:9px;font-size:11px;font-weight:700}
  .stats-card{padding:22px}
  .stats-loading{color:var(--muted);font-size:14px;font-style:italic}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .stat{background:var(--surface-2);border-radius:12px;padding:14px 16px}
  .stat-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .stat-val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;line-height:1.15}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:6px}
  .stat-up{font-family:'Inter',sans-serif;font-size:12px;color:var(--success);font-weight:700;margin-left:6px;vertical-align:2px}
  .stat-down{font-family:'Inter',sans-serif;font-size:12px;color:var(--danger);font-weight:700;margin-left:6px;vertical-align:2px}
  .stat-same{font-family:'Inter',sans-serif;font-size:12px;color:var(--muted);font-weight:600;margin-left:6px;vertical-align:2px}
  .stat-empty .stat-val{font-family:inherit}
  .top-list{display:grid;gap:8px}
  .top-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface-2);border-radius:10px;font-size:14px}
  .top-item b{color:var(--primary-d)}
  .onb-card{padding:22px;border:2px solid var(--accent);background:linear-gradient(180deg,#fff8e7 0%,#ffffff 90%);position:relative}
  .onb-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:14px}
  .onb-dismiss{width:30px;height:30px;border-radius:8px;background:transparent;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;flex-shrink:0}
  .onb-dismiss:hover{background:var(--surface-2);color:var(--ink)}
  .onb-progress{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-bottom:18px}
  .onb-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#e8c87a);transition:width .3s}
  .onb-list{display:grid;gap:10px}
  .onb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:12px;transition:.18s}
  .onb-item.done{background:var(--success-soft);border-color:#bce0cc}
  .onb-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff;background:#fff;flex-shrink:0}
  .onb-item.done .onb-check{background:var(--success);border-color:var(--success)}
  .onb-body{flex:1;min-width:0}
  .onb-title{font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:2px}
  .onb-item.done .onb-title{text-decoration:line-through;color:var(--muted)}
  .onb-desc{font-size:12.5px;color:var(--muted)}
  .onb-done{font-size:12px;font-weight:700;color:var(--success);text-transform:uppercase;letter-spacing:.05em}
  .overlay{position:fixed;inset:0;background:rgba(16,48,47,.42);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:90vh;overflow:auto;padding:24px}
  .modal h3{font-size:20px;margin-bottom:6px}
  .modal .sub{color:var(--muted);font-size:13.5px;margin-bottom:16px}
  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
  .mini-cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:3px 0;text-transform:uppercase}
  .mini-cal-day{aspect-ratio:1/1;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-size:13px;font-weight:600;cursor:pointer}
  .mini-cal-day.empty{background:transparent;cursor:default}
  .mini-cal-day.past{color:#b9c6c5;background:#fafcfc;cursor:not-allowed}
  .mini-cal-day:hover:not(.past):not(.empty){border:1.5px solid var(--primary)}
  .mini-cal-day.sel{background:var(--primary);color:#fff}
  .mini-cal-day.today{outline:1.5px solid var(--accent)}
  .mini-cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .mini-cal-head button{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--ink)}
  .mini-cal-month{font-family:'Fraunces',serif;font-size:16px;text-transform:capitalize}
  .hist-filters{padding:14px 16px}
  .hist-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13.5px;color:var(--muted)}
  .hist-filter-row label{font-weight:600}
  .hist-filter-row select{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink);font-size:13.5px}
  .hist-row{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid var(--border)}
  .hist-row:last-child{border-bottom:none}
  .hist-row.cancelled{opacity:.65}
  .hist-date{flex-shrink:0;text-align:center;background:var(--surface-2);border-radius:10px;padding:8px 12px;min-width:90px}
  .hist-d{font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--ink)}
  .hist-t{font-size:12px;color:var(--muted);margin-top:2px}
  .hist-main{flex:1;min-width:0}
  .hist-name{font-size:14.5px;font-weight:600;color:var(--ink)}
  .hist-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .hist-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
  .hist-badge.done{background:var(--success-soft);color:var(--success)}
  .hist-badge.cancelled{background:var(--danger-soft);color:var(--danger)}
  .pill.anam-done{background:var(--success-soft);color:var(--success);font-weight:700}
  .pill.anam-done:hover{background:#d6ecdf}
  .pill.anam-sent{background:#fff3ee;color:#c2511f;font-weight:600}
  .pill.anam-wait{background:var(--surface-2);color:var(--muted);font-weight:600}
  /* botão de menu (3 pontinhos) e dropdown */
  .pill-icon{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--muted);font-size:18px;line-height:1;display:grid;place-items:center;cursor:pointer;border:none}
  .pill-icon:hover{background:#e4ecec;color:var(--ink)}
  .bk-menu{position:relative}
  .bk-menu-pop{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow-lg);padding:6px;min-width:200px;z-index:5}
  .bk-menu-pop.hidden{display:none}
  .bk-menu-item{display:block;width:100%;text-align:left;padding:10px 14px;border-radius:8px;background:none;border:none;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);font-family:inherit}
  .bk-menu-item:hover{background:var(--surface-2)}
  .bk-menu-item.danger{color:var(--danger)}
  .bk-menu-item.danger:hover{background:var(--danger-soft)}
  /* estados vazios */
  .empty-state{text-align:center;padding:34px 22px}
  .empty-state .empty-ico{font-size:38px;line-height:1;margin-bottom:10px;opacity:.6}
  .empty-state h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .empty-state p{color:var(--muted);font-size:14px;max-width:380px;margin:0 auto 16px;line-height:1.5}
  .empty-cta{display:inline-flex;gap:8px;flex-wrap:wrap;justify-content:center}
  /* celebração onboarding */
  .onb-celebrate{padding:28px 24px;text-align:center;background:linear-gradient(180deg,#fff8e7,#fff);border:2px solid var(--accent)}
  .onb-celebrate-emoji{font-size:46px;line-height:1;margin-bottom:8px}
  /* mini gráfico de barras */
  .mini-chart{display:flex;align-items:flex-end;justify-content:space-around;gap:12px;height:130px;padding:8px 4px 0;background:var(--surface-2);border-radius:12px}
  .mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
  .mini-bar-val{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .mini-bar{width:100%;max-width:42px;background:linear-gradient(180deg,var(--primary) 0%,var(--primary-d) 100%);border-radius:6px 6px 0 0;min-height:3px;transition:height .35s}
  .mini-bar-lbl{font-size:10.5px;font-weight:600;color:var(--muted);margin-top:5px}
  /* hidden helper */
  .hidden{display:none!important}
  .userchip{display:flex;align-items:center;gap:10px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .pf-avatar{width:96px;height:96px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:38px;font-weight:600;overflow:hidden;flex-shrink:0;box-shadow:var(--shadow)}
  .pf-avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .container{max-width:840px;margin:0 auto;padding:28px 22px 70px}
  .page-head{margin-bottom:18px}
  .page-head h1{font-size:26px}.page-head p{color:var(--muted);margin-top:4px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .hint{background:var(--primary-soft);border:1px solid #cfe6e4;color:var(--primary-d);padding:12px 16px;border-radius:12px;font-size:13.5px}
  .hint.gold{background:#f7eed9;border-color:#ecdcb4;color:#8a6d27}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
  .linkbox{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px dashed var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:var(--primary-d);word-break:break-all}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:10px 16px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:14px;transition:.12s;color:var(--ink)}
  .chip:hover{border-color:var(--primary)}
  .chip.on{background:var(--success-soft);border-color:var(--success);color:var(--success)}
  .chip.locked{background:#fafcfc;color:#b9c6c5;border-color:#eef3f3;cursor:not-allowed}
  .chip[data-d].on{background:var(--success-soft);border-color:var(--success);color:var(--success)}
  .bk-card{border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;background:var(--surface);box-shadow:var(--shadow)}
  .bk-trajeto{margin:8px 0 0 0;padding:9px 14px;border-left:3px solid var(--primary);background:linear-gradient(90deg,var(--primary-soft),transparent);border-radius:0 10px 10px 0;font-size:13.5px;display:flex;align-items:center;gap:6px}
  .bk-trajeto-line{color:var(--primary-d)}
  .bk-trajeto-line b{color:var(--ink)}
  .bk-trajeto-spinner{color:var(--muted);font-style:italic}
  .bk-trajeto-warn{color:var(--muted);font-size:12.5px}
  .bk-head{display:flex;align-items:flex-start;gap:14px}
  .bk-date{width:56px;text-align:center;flex-shrink:0;background:var(--surface-2);border-radius:10px;padding:8px 0}
  .bk-date .d{font-family:'Fraunces',serif;font-size:22px;line-height:1}
  .bk-date .m{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .bk-t{font-weight:700}
  .bk-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .bk-line{font-size:14px;margin-top:10px}
  .bk-notes{background:var(--surface-2);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:10px}
  .bk-map{width:100%;height:180px;border:0;border-radius:10px;margin-top:10px;background:var(--surface-2)}
  .bk-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 12px;border-radius:9px;background:var(--surface-2);color:var(--ink);text-decoration:none;border:none;cursor:pointer}
  .pill.dl{background:var(--primary-soft);color:var(--primary-d)}
  .pill.cancel{background:var(--danger-soft);color:var(--danger)}
  .pill.accept{background:var(--success);color:#fff}
  .pill.accept:hover{background:#246245}
  .bk-card-pending{border-color:#e8c87a;background:linear-gradient(180deg,#fffbf2 0%,#ffffff 100%)}
  .bk-ribbon{margin:-16px -16px 14px;padding:8px 16px;background:#f7eed9;color:#8a6d27;font-size:12.5px;font-weight:700;letter-spacing:.02em;border-bottom:1px solid #ecdfbf;border-radius:13px 13px 0 0}
  /* ===== Calendário da Agenda ===== */
  .cal-wrap{border:1px solid var(--border);border-radius:16px;padding:18px;background:var(--surface);box-shadow:var(--shadow);margin-top:14px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .cal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;text-transform:capitalize;letter-spacing:-0.3px}
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-nav-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:16px;cursor:pointer;display:grid;place-items:center;color:var(--ink);transition:.15s}
  .cal-nav-btn:hover{background:var(--surface-2);border-color:var(--primary)}
  .cal-today-btn{font-size:13px;font-weight:600;padding:0 14px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink)}
  .cal-today-btn:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-d)}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
  .cal-dow div{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:4px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-cell{aspect-ratio:1/1;border-radius:11px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.15s;background:transparent;font-size:15px;color:var(--ink);min-height:48px}
  .cal-cell:hover{background:var(--surface-2)}
  .cal-cell.muted{color:#c5cdcc;cursor:default}
  .cal-cell.muted:hover{background:transparent}
  .cal-cell.weekend{color:#7a8281}
  .cal-cell.today{border-color:var(--primary);font-weight:700;color:var(--primary-d)}
  .cal-cell.has-active{background:var(--primary-soft);color:var(--primary-d);font-weight:600}
  .cal-cell.has-active:hover{background:#cce8e6}
  .cal-cell.has-pending{background:#fdf3d8;color:#8a6d27;font-weight:700}
  .cal-cell.has-pending:hover{background:#f7eed9}
  .cal-cell.selected{background:var(--primary)!important;color:#fff!important;border-color:var(--primary);box-shadow:0 4px 12px rgba(14,124,123,.32)}
  .cal-cell.selected .cal-count,.cal-cell.selected .cal-dot{color:#fff!important;background:rgba(255,255,255,.25)!important}
  .cal-count{position:absolute;top:4px;right:6px;font-size:10px;font-weight:700;background:var(--primary);color:#fff;border-radius:8px;min-width:16px;height:16px;display:grid;place-items:center;padding:0 4px;line-height:1}
  .cal-cell.has-pending .cal-count{background:#c79520}
  .cal-dot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--primary)}
  .cal-cell.has-pending .cal-dot{background:#c79520}
  .cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  .cal-legend span{display:inline-flex;align-items:center;gap:5px}
  .cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .cal-day-head{display:flex;align-items:baseline;gap:10px;margin:24px 0 4px;padding:0 2px}

<script>
/* ===== CONFIG (chaves públicas) ===== */
const SUPA_URL = 'https://tuolwdniugjwbepujqoy.supabase.co';
const SUPA_KEY = 'sb_publishable_NwPGO0Ntxu92Lr_CkdMtvg_Je__gZMr';
let sb = null;

const SLOTS=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PROCEDURES_LIST=['Tratamento de canal','Retratamento endodôntico','Pulpectomia','Urgência endodôntica','Avaliação / diagnóstico','Cirurgia perirradicular','Clareamento interno'];
let currentProf=null, appView='visao', dispoDate=todayISO();
let PLANS_APP=[], selectedSubPeriod=null;
const PERIOD_LABEL_APP={ mensal:'Mensal', semestral:'Semestral', anual:'Anual' };
const PERIOD_MONTHS_APP={ mensal:1, semestral:6, anual:12 };

/* ===== Google Calendar ===== */
const GOOGLE_CLIENT_ID='907559413522-b63p3o7nlmtb052voa98rf7bjogjdt0n.apps.googleusercontent.com';
const GOOGLE_REDIRECT='https://www.endodoc.com.br/google-callback';
const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.events';

/* ===== helpers ===== */
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function val(id){return document.getElementById(id).value.trim();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayISO(){const d=new Date();d.setHours(0,0,0,0);return iso(d);}
function hhmm(t){return (t||'').slice(0,5);}
function msg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+(type||'');}
function clearMsg(){const m=document.getElementById('msg');m.className='msg';m.textContent='';}
let tT;function toast(t,type){const e=document.getElementById('toast');e.textContent=(type==='ok'?'✓ ':type==='err'?'⚠ ':'')+t;e.className='toast show '+(type||'');clearTimeout(tT);tT=setTimeout(()=>e.className='toast',2600);}

function switchTab(t){
  document.getElementById('tabLogin').classList.toggle('active',t==='login');
  document.getElementById('tabReg').classList.toggle('active',t==='reg');
  document.getElementById('formLogin').classList.toggle('hidden',t!=='login');
  document.getElementById('formReg').classList.toggle('hidden',t!=='reg');
  document.getElementById('formForgot').classList.toggle('hidden',t!=='forgot');
  document.getElementById('formReset').classList.toggle('hidden',t!=='reset');
  // esconde abas no modo forgot/reset
  document.querySelector('#authView .tabs').classList.toggle('hidden', t==='forgot' || t==='reset');
  clearMsg();
}

/* ===== boot ===== */
async function boot(){
  try{
    if(!window.supabase || !window.supabase.createClient){
      hide('loading'); show('authView');
      msg('Não consegui carregar a biblioteca do Supabase. Recarregue (Cmd+Shift+R) e abra no Google Chrome.','err'); return;
    }
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    // detecta retorno do link de recuperação de senha
    const hash = (location.hash||'').replace(/^#/,'');
    const params = new URLSearchParams(hash);
    const isRecovery = params.get('type') === 'recovery';
    const { data:{ session } } = await sb.auth.getSession();
    hide('loading');
    if(isRecovery){
      show('authView'); switchTab('reset');
      msg('Defina uma nova senha pra sua conta.','ok');
      return;
    }
    if(session){ await openApp(); } else { show('authView'); }
  }catch(err){ hide('loading'); show('authView'); msg('Erro ao iniciar: '+((err&&err.message)||err),'err'); }
}

/* ===== auth ===== */
async function doRegister(e){
  e.preventDefault(); clearMsg();
  const btn=document.getElementById('regBtn'); btn.disabled=true; btn.textContent='Criando…';
  try{
    const email=val('regEmail').toLowerCase(), pass=document.getElementById('regPass').value;
    const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ name:val('regName'), specialty:val('regSpec')||'Endodontia', phone:val('regPhone') } } });
    if(error) throw error;
    // Meta Pixel: signup completo (lead qualificado)
    try{ window.fbqTrack && window.fbqTrack('CompleteRegistration', { content_name: 'Trial signup', status: 'pending_confirmation' }); }catch(_){}
    if(!data.session){ msg('Conta criada! Confirme pelo link no seu e-mail e depois faça login.','ok'); btn.disabled=false; btn.textContent='Começar teste grátis'; return false; }
    // Meta Pixel: trial iniciado (sessão criada direto sem confirm)
    try{ window.fbqTrack && window.fbqTrack('StartTrial', { predicted_ltv: 59, currency: 'BRL' }); }catch(_){}
    await openApp();
  }catch(err){ msg(traduz(err),'err'); btn.disabled=false; btn.textContent='Começar teste grátis'; }
  return false;
}
async function doLogin(e){
  e.preventDefault(); clearMsg();

function traduz(err){const m=(err&&err.message)||'Algo deu errado';
  if(/already registered|already exists/i.test(m))return 'Já existe uma conta com esse e-mail. Tente entrar.';
  if(/Invalid login credentials/i.test(m))return 'E-mail ou senha incorretos.';
  if(/Email not confirmed/i.test(m))return 'Confirme seu e-mail (link enviado) antes de entrar.';
  if(/Password should be at least/i.test(m))return 'A senha precisa ter ao menos 6 caracteres.';
  return m;}

function accessInfo(p){

  const periodEnd = p.current_period_end ? new Date(p.current_period_end) : null;
  const st = p.subscription_status || 'trial';
  if(st==='active' || st==='courtesy'){
    const until = periodEnd ? periodEnd.toLocaleDateString('pt-BR') : null;
    return { hint:`<div class="hint">✓ Assinatura ativa${until?(' até <b>'+until+'</b>'):''}.</div>`, showSubscribe:false };

  if(st==='past_due'){
    return { hint:`<div class="hint gold">⚠ Pagamento em atraso. Regularize abaixo para não perder o acesso.</div>`, showSubscribe:true };
  }
  if(st==='canceled' || (trialEnd && trialDays===0 && st!=='active')){
    return { hint:`<div class="hint gold">⏳ Seu acesso expirou. Assine para continuar.</div>`, showSubscribe:true };

async function loadStats(){
  const el=document.getElementById('statsCard'); if(!el) return;
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const monthStart=new Date(y,m,1), monthEnd=new Date(y,m+1,0);
  const prevStart=new Date(y,m-1,1), prevEnd=new Date(y,m,0);
  const isoLocal=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  const [curRes, prevRes, pendRes] = await Promise.all([
    sb.from('bookings').select('id,slot_date,slot_time,office_name,office_phone,status').eq('status','active')
      .gte('slot_date',isoLocal(monthStart)).lte('slot_date',isoLocal(monthEnd)),
    sb.from('bookings').select('id,slot_date,slot_time,office_name,status').eq('status','active')
      .gte('slot_date',isoLocal(prevStart)).lte('slot_date',isoLocal(prevEnd)),
    sb.from('bookings').select('id',{count:'exact',head:true}).eq('status','pending').gte('slot_date',isoLocal(now))
  ]);
  if(curRes.error){ el.innerHTML='<div style="color:var(--muted)">Não consegui carregar agora.</div>'; return; }
  const cur=curRes.data||[]; const prev=prevRes.data||[]; const pendingCount=pendRes.count||0;

  // contagem por consulta (cada slot = 1 unidade de tempo, mas 1 "consulta" = 1 grupo consecutivo)
  function countConsults(arr){
    const seen=new Set(); let n=0;
    arr.sort((a,b)=>a.slot_date===b.slot_date ? a.slot_time.localeCompare(b.slot_time) : a.slot_date.localeCompare(b.slot_date));
    for(const b of arr){
      const k=b.slot_date+'|'+b.office_name+'|'+(b.office_phone||'');
      if(!seen.has(k)){ seen.add(k); n++; }
    }
    return n;
  }
  const curConsults=countConsults(cur);
  const prevConsults=countConsults(prev);
  const curSlots=cur.length;        // total de horas atendidas
  // soma dos valores REAIS preenchidos em cada atendimento
  const curFat=cur.reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const prevFat=prev.reduce((s,b)=>s+Number(b.consultation_value||0),0);
  const hasAnyValue = curFat>0 || prevFat>0;

  // top consultórios
  const counts={};
  cur.forEach(b=>{ counts[b.office_name]=(counts[b.office_name]||0)+1; });
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);

  const delta=(curr,prv)=>{
    if(prv===0) return curr>0 ? '<span class="stat-up">novo</span>' : '';
    const d=curr-prv;
    if(d===0) return '<span class="stat-same">igual</span>';
    return d>0 ? `<span class="stat-up">↑ ${d}</span>` : `<span class="stat-down">↓ ${Math.abs(d)}</span>`;
  };
  const deltaFat=(curr,prv)=>{
    if(prv===0) return curr>0 ? '<span class="stat-up">novo</span>' : '';
    const pct=Math.round(((curr-prv)/prv)*100);
    if(pct===0) return '<span class="stat-same">igual</span>';
    return pct>0 ? `<span class="stat-up">↑ ${pct}%</span>` : `<span class="stat-down">↓ ${Math.abs(pct)}%</span>`;
  };

  const monthName=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'][m];
  const fmtBRL=v=>'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');

  let html=`<div class="section-title">📊 Resumo de ${monthName}</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Consultas confirmadas</div>
        <div class="stat-val">${curConsults} ${delta(curConsults,prevConsults)}</div>
        ${pendingCount>0?`<div class="stat-sub">+ ${pendingCount} aguardando confirmação</div>`:''}
      </div>
      <div class="stat">
        <div class="stat-label">Horas reservadas</div>
        <div class="stat-val">${curSlots}h</div>
        <div class="stat-sub">mês anterior: ${prev.length}h</div>
      </div>`;
  if(hasAnyValue){
    html += `<div class="stat">
        <div class="stat-label">Receita do mês</div>
        <div class="stat-val">${fmtBRL(curFat)} ${deltaFat(curFat,prevFat)}</div>
        <div class="stat-sub">mês anterior: ${fmtBRL(prevFat)}</div>
      </div>`;
  } else {
    html += `<div class="stat stat-empty">
        <div class="stat-label">Receita do mês</div>
        <div class="stat-val" style="font-size:14px;color:var(--muted);font-weight:400">Preencha o valor cobrado em cada consulta pra ver a receita aqui. Vai em <a href="#" onclick="go('financeiro');return false" style="color:var(--primary);font-weight:600">Financeiro</a>.</div>
      </div>`;
  }
  html += `</div>`;

  // mini gráfico: últimas 4 semanas de consultas confirmadas
  const weekChart = await buildWeekChart(now);
  if(weekChart) html += weekChart;

  if(top.length){
    html += `<div class="section-title" style="margin-top:18px">Top consultórios do mês</div>
      <div class="top-list">${top.map(([name,n])=>`<div class="top-item"><span>${esc(name)}</span><b>${n} ${n===1?'consulta':'consultas'}</b></div>`).join('')}</div>`;
  }
  el.innerHTML=html;
}
async function buildWeekChart(now){
  // pega bookings active dos últimos 28 dias
  const fourWeeksAgo = new Date(now); fourWeeksAgo.setDate(fourWeeksAgo.getDate()-27);
  const iso = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const { data, error } = await sb.from('bookings').select('slot_date,office_name,office_phone').eq('status','active')
    .gte('slot_date', iso(fourWeeksAgo)).lte('slot_date', iso(now));
  if(error) return '';
  const arr = data || [];
  // conta consultas (group) por semana
  const buckets = [0,0,0,0];
  const labels = [];
  for(let i=3;i>=0;i--){
    const wStart = new Date(now); wStart.setDate(wStart.getDate() - (i*7+6));
    const wEnd   = new Date(now); wEnd.setDate(wEnd.getDate() - i*7);
    labels.push(wStart.getDate()+'/'+String(wStart.getMonth()+1).padStart(2,'0'));
    const seen = new Set();
    arr.forEach(b => {
      if(b.slot_date >= iso(wStart) && b.slot_date <= iso(wEnd)){
        const k = b.slot_date+'|'+b.office_name+'|'+(b.office_phone||'');
        if(!seen.has(k)){ seen.add(k); buckets[3-i]++; }
      }
    });
  }
  const max = Math.max(...buckets, 1);
  const bars = buckets.map((v,i) => {
    const h = Math.round((v/max)*100);
    return `<div class="mini-bar-wrap">
      <div class="mini-bar-val">${v}</div>
      <div class="mini-bar" style="height:${h}%"></div>
      <div class="mini-bar-lbl">${labels[i]}</div>
    </div>`;
  }).join('');
  return `<div class="section-title" style="margin-top:18px">Consultas nas últimas 4 semanas</div>
    <div class="mini-chart">${bars}</div>`;
}

    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink);cursor:pointer;margin:2px 0 14px"><input type="checkbox" id="recSkipLunch" checked onchange="updateRecPreview()" style="width:16px;height:16px;accent-color:var(--primary)"> Pular o horário de almoço (12:00 e 13:00)</label>

    <div class="section-title">Editar um dia específico</div>

      <button class="btn btn-ghost btn-sm" onclick="dispoAll(true)">Marcar todos</button>

function getRecHours(){
  const start = (document.getElementById('recStart')?.value) || '09:00';
  const end   = (document.getElementById('recEnd')?.value)   || '18:00';
  const skip  = document.getElementById('recSkipLunch')?.checked;
  const list = [];
  const [sh] = start.split(':').map(Number);
  const [eh] = end.split(':').map(Number);
  for(let h = sh; h < eh; h++){
    const s = String(h).padStart(2,'0')+':00';
    if(skip && (s==='12:00' || s==='13:00')) continue;
    list.push(s);
  }
  return list;
}
function getRecDays(){
  const from = document.getElementById('recFrom')?.value;
  const to   = document.getElementById('recTo')?.value;
  if(!from || !to || to < from) return [];
  const dows = [...document.querySelectorAll('#recDows .chip.on')].map(c=>+c.dataset.d);
  const out = [];
  let d = new Date(from+'T00:00:00'); const end = new Date(to+'T00:00:00');
  while(d <= end){
    if(dows.includes(d.getDay())) out.push(iso(d));
    d.setDate(d.getDate()+1);
  }
  return out;
}
function updateRecPreview(){
  const el = document.getElementById('recPreview'); if(!el) return;
  const days = getRecDays();
  const hours = getRecHours();
  const total = days.length * hours.length;
  if(!days.length){ el.innerHTML = '⚠️ Escolha pelo menos um dia da semana e um período válido.'; el.className='hint gold'; return; }
  if(!hours.length){ el.innerHTML = '⚠️ A hora final precisa ser maior que a inicial.'; el.className='hint gold'; return; }
  el.className = 'hint';
  el.innerHTML = `Vai abrir <b>${total}</b> horário${total===1?'':'s'} (${days.length} dia${days.length===1?'':'s'} × ${hours.length}h por dia).`;
}
function setDispoDate(v){dispoDate=v;loadDispoSlots();}
async function loadDispoSlots(){
  const cont=document.getElementById('dispoSlots'); if(!cont) return;
  const [{data:av},{data:bk}] = await Promise.all([
    sb.from('availability').select('slot_time').eq('slot_date',dispoDate),
    sb.from('bookings').select('slot_time').eq('slot_date',dispoDate).eq('status','active')
  ]);
  const availSet=new Set((av||[]).map(r=>hhmm(r.slot_time)));
  const bookedSet=new Set((bk||[]).map(r=>hhmm(r.slot_time)));
  cont.innerHTML=SLOTS.map(s=>{
    if(bookedSet.has(s)) return `<button class="chip locked" disabled>${s} 🔒</button>`;
    return `<button class="chip ${availSet.has(s)?'on':''}" onclick="toggleSlot('${s}')">${s}</button>`;
  }).join('');
}
async function toggleSlot(s){
  const { data:ex } = await sb.from('availability').select('id').eq('slot_date',dispoDate).eq('slot_time',s);
  if(ex&&ex.length){ await sb.from('availability').delete().eq('slot_date',dispoDate).eq('slot_time',s); }
  else { const{error}=await sb.from('availability').insert({professional_id:currentProf.id,slot_date:dispoDate,slot_time:s}); if(error){toast(error.message,'err');return;} }
  await loadDispoSlots();
}
async function dispoAll(on){
  if(on){
    const rows=SLOTS.map(s=>({professional_id:currentProf.id,slot_date:dispoDate,slot_time:s}));
    const{error}=await sb.from('availability').upsert(rows,{onConflict:'professional_id,slot_date,slot_time',ignoreDuplicates:true});
    if(error){toast(error.message,'err');return;}
  }else{
    const{data:bk}=await sb.from('bookings').select('slot_time').eq('slot_date',dispoDate).eq('status','active');
    const booked=new Set((bk||[]).map(r=>hhmm(r.slot_time)));
    const toDel=SLOTS.filter(s=>!booked.has(s));
    await sb.from('availability').delete().eq('slot_date',dispoDate).in('slot_time',toDel);
  }
  await loadDispoSlots(); toast('Disponibilidade atualizada','ok');
}
async function applyRecurring(){
  const days = getRecDays();
  const hours = getRecHours();
  if(!days.length){toast('Defina período e dias da semana válidos','err');return;}
  if(!hours.length){toast('Hora final precisa ser maior que a inicial','err');return;}
  const rows = [];
  days.forEach(ds => hours.forEach(h => rows.push({professional_id:currentProf.id, slot_date:ds, slot_time:h})));
  toast(`Abrindo ${rows.length} horários…`,'');
  const{error}=await sb.from('availability').upsert(rows,{onConflict:'professional_id,slot_date,slot_time',ignoreDuplicates:true});
  if(error){toast(error.message,'err');return;}
  toast(`✓ ${days.length} dias abertos (${rows.length} horários)`,'ok');
  loadDispoSlots();
}
async function clearRecurring(){
  const days = getRecDays();
  const hours = getRecHours();
  if(!days.length || !hours.length){toast('Defina período, dias e horários válidos','err');return;}
  if(!confirm(`Limpar ${days.length * hours.length} horários nesse período? Os já reservados continuam ativos (não dá pra cancelar pela aba de Disponibilidade).`)) return;
  toast(`Limpando…`,'');
  // pega bookings desse período pra não tirar slots já reservados
  const {data:booked} = await sb.from('bookings').select('slot_date,slot_time').in('slot_date',days).in('status',['active','pending']);
  const bookedSet = new Set((booked||[]).map(b=>b.slot_date+'|'+hhmm(b.slot_time)));
  // deletes em lote por dia
  let removed = 0;
  for(const ds of days){
    const toDel = hours.filter(h => !bookedSet.has(ds+'|'+h));
    if(!toDel.length) continue;
    const {error,count} = await sb.from('availability').delete({count:'exact'}).eq('slot_date',ds).in('slot_time',toDel);
    if(error){ toast(error.message,'err'); return; }
    removed += (count||0);
  }
  toast(`✓ ${removed} horários removidos`,'ok');
  loadDispoSlots();
}

const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function groupBookings(list){
  // agrupa multi-slot consecutivos da mesma reserva: mesmo dia, mesma clínica, mesmo telefone
  const groups=[]; let cur=null;
  for(const b of list){
    const key=b.slot_date+'|'+b.office_name+'|'+(b.office_phone||'');
    if(cur && cur.key===key && cur.lastTime && hourDiff(cur.lastTime,b.slot_time)===1){
      cur.bookings.push(b); cur.lastTime=b.slot_time;
    } else {
      cur={key,bookings:[b],lastTime:b.slot_time};
      groups.push(cur);
    }
  }
  return groups;
}
function hourDiff(a,b){
  const [h1,m1]=a.split(':').map(Number); const [h2,m2]=b.split(':').map(Number);
  return ((h2*60+m2)-(h1*60+m1))/60;
}
function bookingCard(g, opts){
  // g.bookings é array de 1+ slots consecutivos
  const first=g.bookings[0]; const last=g.bookings[g.bookings.length-1];
  const ids=g.bookings.map(x=>x.id);
  const parts=first.slot_date.split('-');const d=+parts[2],m=+parts[1];
  const tStart=hhmm(first.slot_time);
  const tEnd=(()=>{const [h]=last.slot_time.split(':').map(Number);return String(h+1).padStart(2,'0')+':00';})();
  const dur=g.bookings.length;
  const horario = dur>1 ? `${tStart} às ${tEnd} <span style="font-weight:400;color:var(--muted)">(${dur}h)</span>` : tStart;
  const q=encodeURIComponent(first.office_address||'');
  const idsAttr = JSON.stringify(ids);

  const completed = !!first.completed_at;
  const todayStr = todayISO();
  const canMarkDone = !opts.pending && !completed && first.slot_date <= todayStr;
  const reportPill = !opts.pending && completed ? renderReportPill(first.id) : '';
  const prontuarioPill = !opts.pending && completed ? renderProntuarioPill(first.id, !!first.clinical_notes) : '';

  const headerActions = opts.pending
    ? `<div style="display:flex;gap:6px;flex-shrink:0">
         <button class="pill accept" onclick='confirmBks(${idsAttr})'>✓ Confirmar</button>
         <button class="pill cancel" onclick='rejectBks(${idsAttr})'>Recusar</button>
       </div>`
    : completed
    ? `<div class="bk-menu" style="display:flex;gap:6px;flex-shrink:0;align-items:center">
         <button class="pill-icon" title="Mais" onclick='toggleBkMenu(this)'>⋯</button>
         <div class="bk-menu-pop hidden">
           <button class="bk-menu-item" onclick='unmarkCompleted("${first.id}")'>↩️ Desfazer realizado</button>
           <button class="bk-menu-item danger" onclick='cancelBks(${idsAttr})'>❌ Cancelar consulta</button>
         </div>
       </div>`
    : `<div class="bk-menu" style="display:flex;gap:6px;flex-shrink:0;align-items:center">
         <button class="pill" onclick='openReschedule(${idsAttr})'>📅 Reagendar</button>
         <button class="pill-icon" title="Mais" onclick='toggleBkMenu(this)'>⋯</button>
         <div class="bk-menu-pop hidden">
           <button class="bk-menu-item danger" onclick='cancelBks(${idsAttr})'>❌ Cancelar consulta</button>
         </div>
       </div>`;

  let ribbon = '';
  if(opts.pending) ribbon = `<div class="bk-ribbon">⏳ Aguardando sua confirmação</div>`;
  else if(completed) {
    const dt = new Date(first.completed_at);
    const fmt = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} às ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    ribbon = `<div class="bk-ribbon done">✓ Atendimento realizado em ${fmt}</div>`;
  }

  return `<div class="bk-card ${opts.pending?'bk-card-pending':''} ${completed?'completed':''}">
    ${ribbon}
    <div class="bk-head">
      <div class="bk-date"><div class="d">${d}</div><div class="m">${MES[m-1]}</div></div>
      <div style="flex:1;min-width:0">
        <div class="bk-t">${horario} — ${esc(first.office_name)}</div>
        <div class="bk-sub">${esc(first.office_responsible||'')}${first.office_phone?' · '+esc(first.office_phone):''}${first.procedure?' · '+esc(first.procedure):''}</div>
      </div>
      ${headerActions}
    </div>
    <div class="bk-line">📍 ${esc(first.office_address||'—')}</div>
    ${first.patient_name?`<div class="bk-line">👤 <b>${esc(first.patient_name)}</b>${first.patient_phone?' · '+esc(formatPhone(first.patient_phone)):''}</div>`:''}
    ${first.office_address && !completed ?`<iframe class="bk-map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=${q}&z=16&output=embed"></iframe>`:''}
    <div class="bk-notes">📝 ${esc(first.notes||'—')}</div>
    <div class="bk-actions">
      ${!opts.pending && first.patient_phone ? renderAnamnesePill(first.id) : ''}
      ${prontuarioPill}

      ${!opts.pending ? (first.consultation_value ? `<button class="pill prontuario-filled" onclick="openValueModal('${first.id}')" title="Editar valor cobrado">💰 R$ ${Number(first.consultation_value).toFixed(2).replace('.',',')}</button>` : `<button class="pill prontuario-empty" onclick="openValueModal('${first.id}')">💰 Valor cobrado</button>`) : ''}

function renderProntuarioPill(bookingId, hasNotes){

async function confirmDeleteBooking(bookingId){
  if(!confirm('⚠️ Excluir esse atendimento PERMANENTEMENTE?\n\nIsso vai apagar:\n• O atendimento do histórico\n• Anamnese (se houver)\n• Relatório e fotos (se houver)\n• Evento do Google Calendar (se sincronizado)\n• Valor financeiro vinculado\n\nNão é possível recuperar depois. Tem certeza?')) return;
  if(!confirm('Confirmar exclusão definitiva? Última chance.')) return;
  toast('Excluindo…','');
  try{
    // 1) Coleta + apaga fotos do consultation-reports no storage (não cascade)
    const { data:rep } = await sb.from('consultation_reports').select('radiografias,galeria').eq('booking_id',bookingId).maybeSingle();
    if(rep){
      const allPaths = [...(rep.radiografias||[]), ...(rep.galeria||[])].filter(Boolean);
      if(allPaths.length){
        try{ await sb.storage.from('consultation-reports').remove(allPaths); }catch(_){}
      }
    }
    // 2) RPC que valida dono + deleta (cascade limpa anamnese + report no banco + trigger remove Google event)
    const { error } = await sb.rpc('delete_booking_permanently',{ p_booking_id: bookingId });
    if(error) throw error;
    toast('✓ Atendimento excluído','ok');
    closeHistoryDetail();
    // refresh SÓ da view atual
    if(document.getElementById('finContent')) loadFinanceiro();
    else if(document.getElementById('histList')) loadHistorico();
    else if(document.querySelector('.cal-wrap')) renderAgenda();
  }catch(e){
    toast('Erro: '+(e.message||e),'err');
  }
}
function closeHistoryDetail(){
  document.getElementById('modal').classList.remove('modal-lg');
  closeModal();
  window._hdBk = null;
}
function formatPhone(d){
  d=(d||'').replace(/\D/g,'');
  if(d.length===11) return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  if(d.length===10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return d;
}
function renderAnamnesePill(bookingId){
  const a = (window._anamMap||{})[bookingId];
  if(!a) return '<span class="pill anam-wait">⏳ Anamnese: aguardando envio</span>';
  if(a.filled_at){
    return `<button class="pill anam-done" onclick="viewAnamnese('${a.id}')">📋 Ver anamnese</button>`;
  }
  if(a.sent_at){
    return `<span class="pill anam-sent">📤 Anamnese enviada</span>
            <button class="pill" onclick="resendAnamnese('${bookingId}')">Reenviar</button>`;
  }
  return '<span class="pill anam-wait">⏳ Anamnese: aguardando envio</span>';
}

/* ===== Marcar como realizado ===== */
async function markCompleted(firstId, ids){
  if(!confirm('Confirmar que essa consulta foi realizada?\n\nIsso vai marcá-la como concluída e habilitar a criação do relatório pós-consulta.')) return;
  toast('Marcando…','');
  // marca todos os slots do grupo (multi-slot)
  for(const id of (ids||[firstId])){
    const { error } = await sb.rpc('mark_booking_completed',{ p_booking_id: id });
    if(error){ toast('Erro: '+(error.message||'falha ao marcar'),'err'); return; }
  }
  toast('✓ Atendimento marcado como realizado','ok');
  await renderAgenda();
  setTimeout(()=>{
    if(confirm('Deseja criar o relatório pós-consulta agora?\n\nVocê pode enviá-lo automaticamente pro WhatsApp do consultório quando terminar.')){
      openReport(firstId);
    }
  }, 350);
}
async function unmarkCompleted(bookingId){
  if(!confirm('Desfazer marcação de realizado?\n\nO atendimento volta pra status normal. Se já existir um relatório, ele permanece salvo.')) return;
  toast('Desfazendo…','');
  const { error } = await sb.rpc('unmark_booking_completed',{ p_booking_id: bookingId });
  if(error){ toast('Erro: '+(error.message||'falha'),'err'); return; }
  toast('Marcação desfeita','ok');
  await renderAgenda();
}

/* ===== Relatório pós-consulta ===== */

    data_finalizacao: bk.slot_date,
    diagnostico: '',

    irrigacao: '',
    sistema: '',
    cimento: '',
    intercorrencia: false,
    intercorrencia_descricao: '',
    dente: '',
    procedimento_detalhado: '',

function showReportModal(){

function readReportForm(){

  if(!f) return null;

  return {
    ...r,
    indicador: get('indicador') || null,
    data_inicio: get('data_inicio') || null,
    data_finalizacao: get('data_finalizacao') || null,
    diagnostico: get('diagnostico') || null,
    sugestao_reabilitacao: get('sugestao_reabilitacao') || null,
    procedimento_realizado: get('procedimento_realizado') || null,
    irrigacao: get('irrigacao') || null,
    sistema: get('sistema') || null,
    cimento: get('cimento') || null,
    intercorrencia: !!f.elements['intercorrencia']?.checked,
    intercorrencia_descricao: get('intercorrencia_descricao') || null,
    dente: get('dente'),
    procedimento_detalhado: get('procedimento_detalhado') || null,
    relato_caso: get('relato_caso'),
    retorno: get('retorno') || null,
  };
}
async function saveReportDraft(silent){
  const data = readReportForm(); if(!data) return null;
  if(!data.dente){ if(!silent) toast('Informe o dente','err'); return null; }
  if(!data.relato_caso){ if(!silent) toast('Preencha o relato do caso','err'); return null; }
  const payload = {
    booking_id: data.booking_id,
    professional_id: data.professional_id,
    indicador: data.indicador, data_inicio: data.data_inicio, data_finalizacao: data.data_finalizacao,
    diagnostico: data.diagnostico, sugestao_reabilitacao: data.sugestao_reabilitacao,
    procedimento_realizado: data.procedimento_realizado, irrigacao: data.irrigacao,
    sistema: data.sistema, cimento: data.cimento, intercorrencia: data.intercorrencia,
    intercorrencia_descricao: data.intercorrencia_descricao, dente: data.dente,
    procedimento_detalhado: data.procedimento_detalhado, relato_caso: data.relato_caso,
    retorno: data.retorno, radiografias: data.radiografias||[], galeria: data.galeria||[],
  };
  let result;
  if(data.id){
    result = await sb.from('consultation_reports').update(payload).eq('id',data.id).select().maybeSingle();
  } else {
    result = await sb.from('consultation_reports').insert(payload).select().maybeSingle();
  }
  if(result.error){ if(!silent) toast('Erro ao salvar: '+result.error.message,'err'); return null; }
  window._report = {...window._report, ...result.data};
  if(!silent) toast('✓ Rascunho salvo','ok');
  return result.data;
}
async function sendReportToOffice(){
  const data = readReportForm(); if(!data) return;
  if(!data.dente){ toast('Informe o dente','err'); return; }
  if(!data.relato_caso){ toast('Preencha o relato do caso','err'); return; }
  const bk = window._report.booking;
  if(!bk.office_phone){ toast('Esse atendimento não tem telefone do consultório cadastrado','err'); return; }
  if(!confirm('Enviar o relatório pelo WhatsApp pra '+formatPhone(bk.office_phone)+'?')) return;
  toast('Salvando…','');
  const saved = await saveReportDraft(true);
  if(!saved){ toast('Erro ao salvar antes do envio','err'); return; }
  toast('Gerando PDF…','');
  const pdfB64 = await generateReportPDFBase64();
  if(!pdfB64){ toast('Erro ao gerar PDF','err'); return; }
  toast('Enviando WhatsApp…','');
  try{
    const sess = await sb.auth.getSession();
    const tok = sess?.data?.session?.access_token;
    const res = await fetch(SUPA_URL+'/functions/v1/send-whatsapp-report',{
      method:'POST',
      headers:{'Content-Type':'application/json', Authorization:'Bearer '+tok},
      body: JSON.stringify({ report_id: saved.id, pdf_base64: pdfB64 })
    });
    if(!res.ok){ const t=await res.text(); throw new Error(t||'http '+res.status); }
    toast('✓ Relatório enviado pro consultório!','ok');
    setTimeout(()=>{ closeReport(); renderAgenda(); }, 800);
  }catch(e){
    toast('Erro ao enviar: '+(e.message||e),'err');
  }
}
async function previewReportPDF(){
  const data = readReportForm(); if(!data) return;
  if(!data.dente){ toast('Informe o dente','err'); return; }

/* ===== Upload de fotos do relatório ===== */
const REPORT_PHOTO_MAX = 10;
function renderPhotoGrid(type, paths){
  const count = (paths||[]).length;
  const atLimit = count >= REPORT_PHOTO_MAX;
  const counter = `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-align:right;font-weight:600">${count} / ${REPORT_PHOTO_MAX} fotos</div>`;
  const items = (paths||[]).map((p,i)=>{
    const url = sb.storage.from('consultation-reports').getPublicUrl(p).data.publicUrl;
    return `<div class="photo-thumb"><img src="${esc(url)}" alt=""><button type="button" class="ph-rm" onclick="removeReportPhoto('${type}',${i})" title="Remover">✕</button></div>`;
  }).join('');
  const addBtn = atLimit ? '' : `<label class="photo-add" title="Adicionar foto">+
    <input type="file" accept="image/*" multiple style="display:none" onchange="handleReportPhotos('${type}',this.files)">
  </label>`;
  if(!count){
    return `${counter}<label class="photo-area-empty">
      <input type="file" accept="image/*" multiple style="display:none" onchange="handleReportPhotos('${type}',this.files)">
      📎 <b>Clique pra adicionar fotos</b> ou arraste aqui<br>
      <span style="font-size:11.5px">JPG, PNG · até ${REPORT_PHOTO_MAX} fotos · várias de uma vez</span>
    </label>`;
  }
  return `${counter}<div class="photo-grid">${items}${addBtn}</div>`;
}
async function handleReportPhotos(type, files){
  if(!files || !files.length) return;
  const r = window._report; if(!r) return;
  const area = type==='radiografias' ? document.getElementById('phAreaRx') : document.getElementById('phAreaGal');
  const current = (r[type]||[]).length;
  const remaining = REPORT_PHOTO_MAX - current;
  if(remaining <= 0){
    toast(`Máximo de ${REPORT_PHOTO_MAX} fotos já atingido`,'err');
    return;
  }
  // pega só até o limite restante
  const toProcess = Array.from(files).slice(0, remaining);
  if(files.length > remaining){
    toast(`Você selecionou ${files.length} fotos, mas só restam ${remaining} vagas — usando as primeiras`,'err');
  }
  for(const file of toProcess){
    if(!file.type.startsWith('image/')){ toast('Arquivo "'+file.name+'" não é imagem','err'); continue; }
    if(file.size > 8*1024*1024){ toast('"'+file.name+'" passa de 8MB, comprima antes','err'); continue; }
    try{
      const compressed = await compressImage(file, 1400, 0.82);
      const ext = (compressed.type.split('/')[1]||'jpg').replace('jpeg','jpg');
      const ts = Date.now()+'-'+Math.random().toString(36).slice(2,8);
      const path = `${currentProf.id}/${r.booking_id}/${type}/${ts}.${ext}`;
      const { error } = await sb.storage.from('consultation-reports').upload(path, compressed, { contentType: compressed.type });
      if(error){ toast('Erro no upload: '+error.message,'err'); continue; }
      r[type] = [...(r[type]||[]), path];
    }catch(e){ toast('Falha: '+(e.message||e),'err'); }
  }
  // re-render só essa área
  if(area) area.innerHTML = renderPhotoGrid(type, r[type]||[]);
}
async function removeReportPhoto(type, idx){
  const r = window._report; if(!r) return;
  const path = (r[type]||[])[idx]; if(!path) return;
  if(!confirm('Remover essa foto do relatório?')) return;
  try{ await sb.storage.from('consultation-reports').remove([path]); }catch(_){}
  r[type] = r[type].filter((_,i)=>i!==idx);
  const area = type==='radiografias' ? document.getElementById('phAreaRx') : document.getElementById('phAreaGal');
  if(area) area.innerHTML = renderPhotoGrid(type, r[type]||[]);
}
function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let {width, height} = img;
      const scale = Math.min(1, maxDim/Math.max(width,height));
      width = Math.round(width*scale); height = Math.round(height*scale);
      const c = document.createElement('canvas'); c.width=width; c.height=height;
      c.getContext('2d').drawImage(img,0,0,width,height);
      c.toBlob(b => b ? resolve(new File([b],'photo.jpg',{type:'image/jpeg'})) : reject(new Error('blob fail')), 'image/jpeg', quality);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function generateReportPDFBlob(){
  const doc = await buildReportPDF();
  return doc ? doc.output('blob') : null;
}
async function generateReportPDFBase64(){
  const doc = await buildReportPDF();
  if(!doc) return null;
  const b64 = doc.output('datauristring').split(',')[1];
  return b64;
}
async function getEndoLogoDataURL(){
  if(window._endoLogoCache) return window._endoLogoCache;
  try{
    const r = await fetch('/brand/favicon.svg');
    if(!r.ok) return null;
    const svgText = await r.text();
    const blob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = reject;
      i.src = url;
    });
    const size = 512;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const dataURL = canvas.toDataURL('image/png');
    window._endoLogoCache = dataURL;
    return dataURL;
  }catch(e){
    console.warn('logo load failed', e);
    return null;
  }
}
async function buildReportPDF(){
  const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if(!jsPDFCtor){ return null; }
  const data = readReportForm() || window._report;
  const bk = window._report.booking;
  const prof = currentProf || {};

  const doc = new jsPDFCtor({ unit:'mm', format:'a4', orientation:'portrait' });
  const pageW = 210, pageH = 297;
  const mL = 15, mR = 15, mB = 18;
  const contentW = pageW - mL - mR;
  let y = 15;

  // ===== Cabeçalho =====
  const logoData = await getEndoLogoDataURL();
  const logoSize = 16;
  if(logoData){
    doc.addImage(logoData, 'PNG', mL, y-2, logoSize, logoSize);
  }
  const textX = mL + logoSize + 2;
  doc.setTextColor(10,93,92); doc.setFont('helvetica','bold'); doc.setFontSize(17);
  doc.text('endodoc', textX, y+6.5);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(94,112,111);
  doc.text('RELATÓRIO DE CONSULTA ENDODÔNTICA', textX, y+10.5);
  doc.setTextColor(22,48,47); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text(prof.name||'', pageW-mR, y+5, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(94,112,111);
  doc.text(prof.specialty||'Endodontia', pageW-mR, y+10, {align:'right'});
  y += 16;
  doc.setDrawColor(10,93,92); doc.setLineWidth(0.5); doc.line(mL, y, pageW-mR, y); y += 7;

  // ===== Nome do paciente — destaque =====
  doc.setTextColor(22,48,47); doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text(bk.patient_name || 'Paciente', mL, y);
  y += 7;
  if(data.indicador){
    doc.setFont('helvetica','italic'); doc.setFontSize(10); doc.setTextColor(94,112,111);
    doc.text('Indicador: '+data.indicador, mL, y); y += 6;
  }

  // ===== Datas =====
  const fmtBR = iso => { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
  function dateBox(label, val, x, yPos){
    doc.setFillColor(248,232,232);
    doc.roundedRect(x, yPos, (contentW-6)/2, 9, 2, 2, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(120,40,60);
    doc.text(label+':', x+3, yPos+6);
    doc.setFont('helvetica','italic'); doc.setTextColor(22,48,47);
    doc.text(val, x+3+doc.getTextWidth(label+':')+2, yPos+6);
  }
  dateBox('Data de Início', fmtBR(data.data_inicio), mL, y);
  dateBox('Data de Finalização', fmtBR(data.data_finalizacao), mL+(contentW-6)/2+6, y);
  y += 13;

  // ===== Bloco clínico (texto) =====
  function bulletLine(lbl, val, yPos){
    if(!val) return yPos;
    doc.setFillColor(248,232,232); doc.rect(mL, yPos-0.5, 2, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(120,40,60);
    doc.text(lbl+':', mL+4, yPos+3.2);
    const labelW = doc.getTextWidth(lbl+':')+2;
    doc.setFont('helvetica','italic'); doc.setTextColor(22,48,47);
    const lines = doc.splitTextToSize(val, contentW - 4 - labelW - 2);
    doc.text(lines, mL+4+labelW, yPos+3.2);
    return yPos + 5 + (lines.length-1)*4.5;
  }
  y = bulletLine('Diagnóstico', data.diagnostico, y) + 2;
  y = bulletLine('Sugestão Reabilitação', data.sugestao_reabilitacao, y) + 2;
  y = bulletLine('Procedimento Realizado', data.procedimento_realizado, y) + 4;

  // ===== Linha de tags (dente, irrigação etc) =====
  function tagBox(lbl, val, x, yPos, w){
    if(!val) return;
    doc.setFillColor(248,232,232);
    doc.roundedRect(x, yPos, w, 7.5, 1.5, 1.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(120,40,60);
    doc.text(lbl+':', x+2.5, yPos+5);
    doc.setFont('helvetica','normal'); doc.setTextColor(22,48,47);
    const labelW = doc.getTextWidth(lbl+':')+2;
    const valStr = String(val);
    const truncated = doc.splitTextToSize(valStr, w-labelW-4)[0] || valStr;
    doc.text(truncated, x+2.5+labelW, yPos+5);
  }
  const tagW = (contentW-8)/3;
  tagBox('Irrigação', data.irrigacao||'', mL, y, tagW);
  tagBox('Cimento', data.cimento||'', mL+tagW+4, y, tagW);
  tagBox('Dente', data.dente||'', mL+(tagW+4)*2, y, tagW);
  y += 10;
  tagBox('Sistema', data.sistema||'', mL, y, tagW);
  const intercorVal = data.intercorrencia ? (data.intercorrencia_descricao || 'Sim') : 'Não';
  doc.setFillColor(248,232,232);
  doc.roundedRect(mL+tagW+4, y, tagW, 7.5, 1.5, 1.5, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(120,40,60);
  doc.text('Intercorrência:', mL+tagW+4+2.5, y+5);
  const ilbl = doc.getTextWidth('Intercorrência:')+2;
  doc.setFont('helvetica','bold');
  doc.setTextColor(data.intercorrencia ? 165 : 30, data.intercorrencia ? 60 : 110, data.intercorrencia ? 45 : 70);
  const itrunc = doc.splitTextToSize(intercorVal, tagW-ilbl-4)[0] || intercorVal;
  doc.text(itrunc, mL+tagW+4+2.5+ilbl, y+5);
  y += 12;

  // ===== Radiografias =====
  if((data.radiografias||[]).length){
    y = await ensureSpace(doc, y, 50, mB);
    doc.setFillColor(248,232,232); doc.rect(mL, y-0.5, 3, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(22,48,47);
    doc.text('Radiografias:', mL+5, y+3);
    y += 7;
    doc.setDrawColor(220,224,226); doc.setLineWidth(0.2); doc.line(mL, y, pageW-mR, y); y += 3;
    y = await drawPhotoRow(doc, data.radiografias, y, mL, contentW, 3, 45, mB);
    y += 5;
  }

  // ===== Procedimento detalhado =====
  if(data.procedimento_detalhado){
    y = await ensureSpace(doc, y, 18, mB);
    doc.setFillColor(248,232,232); doc.rect(mL, y-0.5, 3, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(22,48,47);
    doc.text('🦷 Procedimento Realizado:', mL+5, y+3);
    y += 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(120,40,60);
    const procLines = String(data.procedimento_detalhado).split(/\n+/).filter(Boolean);
    for(const line of procLines){
      y = await ensureSpace(doc, y, 6, mB);
      const w = doc.splitTextToSize(line, contentW);
      doc.text(w, mL, y+3);
      y += 5 + (w.length-1)*4.5;
    }
    y += 4;
  }

  // ===== Relato do caso =====
  if(data.relato_caso){
    y = await ensureSpace(doc, y, 18, mB);
    doc.setDrawColor(220,224,226); doc.setLineWidth(0.2); doc.line(mL, y, pageW-mR, y); y += 4;
    doc.setFillColor(248,232,232); doc.rect(mL, y-0.5, 3, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(22,48,47);
    doc.text('Relato do Caso:', mL+5, y+3);
    y += 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(40,52,52);
    const paragraphs = String(data.relato_caso).split(/\n+/);
    for(const p of paragraphs){
      if(!p.trim()) continue;
      y = await ensureSpace(doc, y, 6, mB);
      const lines = doc.splitTextToSize(p, contentW);
      doc.text(lines, mL, y+3);
      y += 5 + (lines.length-1)*4.5 + 1.5;
    }
    if(data.retorno){
      y += 2;
      y = await ensureSpace(doc, y, 7, mB);
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(22,48,47);
      doc.text('Retorno:', mL, y+3);
      doc.setFont('helvetica','italic'); doc.setTextColor(165,60,45);
      doc.text(data.retorno, mL+18, y+3);
      y += 6;
    }
    y += 4;
  }

  // ===== Galeria =====
  if((data.galeria||[]).length){
    y = await ensureSpace(doc, y, 50, mB);
    doc.setDrawColor(220,224,226); doc.setLineWidth(0.2); doc.line(mL, y, pageW-mR, y); y += 4;
    doc.setFillColor(248,232,232); doc.rect(mL, y-0.5, 3, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(22,48,47);
    doc.text('Galeria:', mL+5, y+3);
    y += 7;
    y = await drawPhotoRow(doc, data.galeria, y, mL, contentW, 3, 50, mB);
    y += 5;
  }

  // ===== Rodapé em cada página =====
  const pageCount = doc.internal.getNumberOfPages();
  for(let p=1; p<=pageCount; p++){
    doc.setPage(p);
    doc.setFontSize(8); doc.setTextColor(150,150,150); doc.setFont('helvetica','normal');
    doc.text((bk.patient_name||'Paciente'), mL, pageH-8);
    doc.text(String(p)+' / '+pageCount, pageW-mR, pageH-8, {align:'right'});
    doc.text('EndoDoc · endodoc.com.br', pageW/2, pageH-8, {align:'center'});
  }

  return doc;
}
async function ensureSpace(doc, y, needed, mB){
  if(y + needed > 297 - mB){ doc.addPage(); return 15; }
  return y;
}
async function drawPhotoRow(doc, paths, y, mL, contentW, perRow, sizeMM, mB){
  const gap = 3;
  const cellW = (contentW - gap*(perRow-1)) / perRow;
  const cellH = sizeMM;
  let row = 0, col = 0;
  for(const path of paths){
    const url = sb.storage.from('consultation-reports').getPublicUrl(path).data.publicUrl;
    let dataUrl;
    try{ dataUrl = await fetchImageAsDataURL(url); }catch(_){ continue; }
    if(col === 0){ y = await ensureSpace(doc, y, cellH + 4, mB); }
    const x = mL + col*(cellW+gap);
    try{
      doc.addImage(dataUrl, 'JPEG', x, y, cellW, cellH, undefined, 'FAST');
    }catch(_){}
    col++;
    if(col >= perRow){ col = 0; y += cellH + gap; }
  }
  if(col > 0) y += cellH + gap;
  return y;
}
function fetchImageAsDataURL(url){
  return new Promise((resolve,reject)=>{
    fetch(url).then(r=>r.blob()).then(blob=>{
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    }).catch(reject);
  });
}

function renderCalendar(y, m, selectedISO, counts){
  const mesNames=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dowNames=['dom','seg','ter','qua','qui','sex','sáb'];
  const first = new Date(y, m-1, 1);
  const firstDow = first.getDay();
  const lastDay = new Date(y, m, 0).getDate();
  const prevLastDay = new Date(y, m-1, 0).getDate();
  const todayStr = todayISO();

  let cells = '';
  // dias do mês anterior (preenchimento)
  for(let i = firstDow-1; i >= 0; i--){
    cells += `<div class="cal-cell muted">${prevLastDay - i}</div>`;
  }
  // dias do mês
  for(let d = 1; d <= lastDay; d++){
    const iso = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(y, m-1, d).getDay();
    const c = counts[iso];
    let cls = 'cal-cell';
    if(dow === 0 || dow === 6) cls += ' weekend';
    if(iso === todayStr) cls += ' today';
    if(c){
      if(c.pending > 0) cls += ' has-pending';
      else if(c.active > 0) cls += ' has-active';
    }
    if(iso === selectedISO) cls += ' selected';
    const total = c ? (c.active + c.pending) : 0;
    const badge = total > 0 ? `<span class="cal-count">${total}</span>` : '';
    cells += `<div class="${cls}" onclick="selectAgendaDay('${iso}')">${badge}${d}</div>`;
  }
  // dias do próximo mês (preenchimento até completar a grade)
  const used = firstDow + lastDay;
  const trailing = (7 - (used % 7)) % 7;
  for(let d = 1; d <= trailing; d++){
    cells += `<div class="cal-cell muted">${d}</div>`;
  }

  return `<div class="cal-wrap">
    <div class="cal-head">
      <div class="cal-title">${mesNames[m-1]} ${y}</div>
      <div class="cal-nav">
        <button class="cal-today-btn" onclick="agendaToday()">Hoje</button>
        <button class="cal-nav-btn" onclick="agendaShiftMonth(-1)" title="Mês anterior">‹</button>
        <button class="cal-nav-btn" onclick="agendaShiftMonth(1)" title="Próximo mês">›</button>
      </div>
    </div>
    <div class="cal-dow">${dowNames.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <span><i style="background:var(--primary-soft)"></i>Confirmadas</span>
      <span><i style="background:#fdf3d8"></i>Aguardando confirmação</span>
      <span><i style="background:transparent;border:1.5px solid var(--primary)"></i>Hoje</span>
    </div>
  </div>`;
}

function renderSelectedDay(iso, active, pending){
  const dayActive = active.filter(b => b.slot_date === iso);
  const dayPending = pending.filter(b => b.slot_date === iso);
  const gActive = groupBookings(dayActive);
  const gPending = groupBookings(dayPending);
  const total = gActive.length + gPending.length;

  const [y, mo, d] = iso.split('-').map(Number);
  const dt = new Date(y, mo-1, d);
  const dowNames=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const mesNames=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const isToday = iso === todayISO();
  const label = `${dowNames[dt.getDay()]}, ${d} de ${mesNames[mo-1]}`;

  let html = `<div class="cal-day-head">
    <h2>${isToday ? 'Hoje · ' : ''}${label}</h2>
    <span class="meta">${total ? total+' atendimento'+(total>1?'s':'') : 'sem atendimentos'}</span>
  </div>`;

  if(!total){
    html += `<div class="cal-empty-day">Nenhum atendimento marcado nesse dia.</div>`;
    return html;
  }

  // primeiro mostra pendentes desse dia (se houver), depois os ativos com trajetos
  if(gPending.length){
    html += gPending.map(g => bookingCard(g, {pending:true})).join('');
  }
  if(gActive.length){
    html += gActive.map((g, i) => {
      const card = bookingCard(g, {pending:false});
      const next = gActive[i+1];
      if(next){
        const fromId = g.bookings[g.bookings.length-1].id;
        const toId = next.bookings[0].id;
        return card + `<div class="bk-trajeto" data-from="${fromId}" data-to="${toId}"><span class="bk-trajeto-spinner">🚗 calculando trajeto…</span></div>`;
      }
      return card;
    }).join('');
  }
  return html;
}

function selectAgendaDay(iso){

function agendaShiftMonth(delta){
  if(!window._agenda) return;
  const [y, m] = window._agenda.month.split('-').map(Number);
  const dt = new Date(y, m-1+delta, 1);
  window._agenda.month = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
  renderAgendaView();
}
function agendaToday(){
  if(!window._agenda) return;
  const t = todayISO();
  window._agenda.month = t.slice(0,7);
  window._agenda.selected = t;
  renderAgendaView();
}
async function enrichTravelTimesGrouped(groups){
  const pairs=[]; const nodes=[];
  for(let i=0;i<groups.length-1;i++){
    const a=groups[i].bookings[groups[i].bookings.length-1];
    const b=groups[i+1].bookings[0];
    if(a.slot_date!==b.slot_date) continue;
    const node=document.querySelector(`.bk-trajeto[data-from="${a.id}"][data-to="${b.id}"]`);
    if(!node) continue;
    if(!a.office_lat || !a.office_lng || !b.office_lat || !b.office_lng){
      node.innerHTML='<span class="bk-trajeto-warn">🚗 sem endereço completo pra calcular o trajeto</span>';
      continue;
    }
    pairs.push({ origin:{lat:a.office_lat,lng:a.office_lng}, dest:{lat:b.office_lat,lng:b.office_lng} });
    nodes.push(node);
  }
  if(!pairs.length) return;
  try{
    const r=await fetch(SUPA_URL+'/functions/v1/travel-time',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pairs})
    });
    if(!r.ok) throw new Error('http '+r.status);
    const {results}=await r.json();
    (results||[]).forEach((res,i)=>{
      const node=nodes[i]; if(!node) return;
      if(!res){ node.innerHTML='<span class="bk-trajeto-warn">🚗 rota não encontrada</span>'; return; }
      const min=Math.round(res.duration_s/60);
      const km=(res.distance_m/1000).toFixed(1).replace('.',',');
      node.innerHTML=`<span class="bk-trajeto-line">🚗 <b>${min} min</b> · ${km} km até o próximo</span>`;
    });
  }catch(e){
    nodes.forEach(n=>{ n.innerHTML='<span class="bk-trajeto-warn">🚗 não consegui calcular agora</span>'; });
  }
}

    doc.setFont('helvetica','normal'); doc.setTextColor(94,112,111);
    doc.text('Consulta:', colR, yy);
    doc.setTextColor(22,48,47); doc.setFont('helvetica','bold');
    doc.text(consultaDate + (consultaTime?' às '+consultaTime:''), colR+16, yy);

    yy += 6;
    doc.setFont('helvetica','normal'); doc.setTextColor(94,112,111);
    doc.text('Consultório:', colL, yy);
    doc.setTextColor(22,48,47);
    doc.text(String(b.office_name||'—'), colL+19, yy);
    doc.setTextColor(94,112,111);
    doc.text('Procedimento:', colR, yy);
    doc.setTextColor(22,48,47);
    doc.text(String(b.procedure||'—'), colR+22, yy);

    yy += 6;
    doc.setTextColor(94,112,111);
    doc.text('Preenchida em:', colL, yy);
    doc.setTextColor(22,48,47);
    doc.text(filledStr, colL+23, yy);

    y += blocoH + 6;

    // ===== Tabela de perguntas =====
    doc.setDrawColor(22,48,47); doc.setLineWidth(0.5);
    doc.line(mL, y, pageW-mR, y);
    y += 4;

    const labelW = contentW * 0.50;
    const answerX = mL + labelW + 4;
    const answerW = contentW - labelW - 4;

    function checkBreak(extra){
      if(y + extra > pageH - mB){
        doc.addPage();
        y = 15;
      }
    }

    for(const [id,label] of ANAM_QUESTIONS){
      const v = (a.data||{})[id];
      if(!v) continue;

      // Quebra texto longo
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
      const labelLines = doc.splitTextToSize(label, labelW - 2);

      doc.setFontSize(9);
      let answerText = v, answerColor = [22,48,47], answerBold = false;
      if(v==='sim'){ answerText='SIM';    answerColor=[192,73,47];  answerBold=true; }
      else if(v==='nao'){ answerText='Não'; answerColor=[46,125,87];  answerBold=true; }
      else if(v==='naosei'){ answerText='Não sei'; answerColor=[136,136,136]; }
      const answerLines = doc.splitTextToSize(answerText, answerW - 2);

      const lineH = 4.2;
      const rowH = Math.max(labelLines.length, answerLines.length) * lineH + 2;
      checkBreak(rowH + 2);

      doc.setTextColor(94,112,111); doc.setFontSize(8.5);
      doc.setFont('helvetica','normal');
      doc.text(labelLines, mL, y+3);

      doc.setTextColor(...answerColor);
      doc.setFont('helvetica', answerBold?'bold':'normal');
      doc.setFontSize(9);
      doc.text(answerLines, answerX, y+3);

      y += rowH;

      // detalhe (quando "Sim")
      const det = (a.data||{})[id+'_detail'];
      if(det){
        doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
        const detLines = doc.splitTextToSize(String(det), answerW - 4);
        const detH = detLines.length * 4 + 4;
        checkBreak(detH + 2);
        // background dourado claro
        doc.setFillColor(255,251,242);
        doc.rect(answerX-2, y, answerW, detH, 'F');
        // barra dourada à esquerda
        doc.setFillColor(194,160,99);
        doc.rect(answerX-2, y, 1, detH, 'F');
        doc.setTextColor(58,47,23);
        doc.text(detLines, answerX+1, y+4);
        y += detH;
      }

      // linha separadora
      doc.setDrawColor(225,225,225); doc.setLineWidth(0.2);
      doc.line(mL, y+1, pageW-mR, y+1);
      y += 3;
    }

    // ===== Rodapé na última página =====
    doc.setFontSize(7.5); doc.setTextColor(150,150,150); doc.setFont('helvetica','normal');
    doc.text('Documento gerado em '+docGenerated+'  ·  EndoDoc  ·  endodoc.com.br', pageW/2, pageH-8, {align:'center'});

    const safeName = pname.replace(/[^\w\s-]/g,'').replace(/\s+/g,'_');
    const fileDate = b.slot_date ? b.slot_date.replace(/-/g,'') : '';
    doc.save(`Anamnese_${safeName}${fileDate?'_'+fileDate:''}.pdf`);
    toast('PDF baixado!','ok');
  }catch(e){
    console.error(e);
    toast('Erro ao gerar PDF: '+(e.message||e),'err');
  }
}

let histState = { range:'90d', status:'all', search:'' };
async function renderHistorico(){
  const body=document.getElementById('appBody');
  body.innerHTML = `<div class="page-head"><h1>Histórico</h1><p>Consultas passadas e canceladas.</p></div>
    <div class="card hist-filters">

          <option value="all" ${histState.range==='all'?'selected':''}>Tudo</option>
        </select>
        <label style="margin-left:14px">Status:</label>
        <select id="histStatus" onchange="histState.status=this.value;loadHistorico()">
          <option value="all" ${histState.status==='all'?'selected':''}>Todas</option>
