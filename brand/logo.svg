<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" role="img" aria-label="EndoDoc">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7c7b"/>
      <stop offset="100%" stop-color="#0a5d5c"/>
    </linearGradient>
  </defs>
  <!-- Símbolo: monograma "E" em serif dentro de círculo -->
  <g transform="translate(8,8)">
    <circle cx="36" cy="36" r="36" fill="url(#ring)"/>
    <circle cx="36" cy="36" r="32" fill="none" stroke="#c2a063" stroke-width="1.2" opacity=".55"/>
    <text x="36" y="50.5" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="44" fill="#ffffff">E</text>
  </g>
  <!-- Wordmark "endodoc" em serif -->
  <text x="98" y="56" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="36" fill="#16302f" letter-spacing="-0.5">endodoc</text>
  <!-- Acento dourado sutil sob "doc" -->
  <rect x="218" y="62" width="40" height="2.5" rx="1.25" fill="#c2a063"/>
</svg>
