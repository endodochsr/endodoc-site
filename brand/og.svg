<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="EndoDoc — Sua agenda cheia, sem viver no WhatsApp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7c7b"/>
      <stop offset="100%" stop-color="#08494a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#f2683c" stop-opacity=".35"/>
      <stop offset="60%" stop-color="#f2683c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo: mark + wordmark -->
  <g transform="translate(80,72)">
    <circle cx="36" cy="36" r="36" fill="#ffffff"/>
    <circle cx="36" cy="36" r="32" fill="none" stroke="#c2a063" stroke-width="1.4" opacity=".7"/>
    <text x="36" y="50.5" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="44" fill="#0a5d5c">E</text>
    <text x="98" y="56" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="36" fill="#ffffff">endodoc</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="270" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="74" fill="#ffffff" letter-spacing="-1.5">Sua agenda cheia,</text>
  <text x="80" y="350" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="74" fill="#ffffff" letter-spacing="-1.5">sem viver no <tspan fill="#f2a07a">WhatsApp</tspan>.</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,.78)">A agenda inteligente para endodontistas delivery.</text>

  <!-- Bottom badges -->
  <g transform="translate(80,490)" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#ffffff">
    <g>
      <rect x="0" y="0" width="280" height="58" rx="29" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
      <text x="28" y="38">🚗  Logística inteligente</text>
    </g>
    <g transform="translate(304,0)">
      <rect width="260" height="58" rx="29" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
      <text x="28" y="38">📅  Sync Google</text>
    </g>
    <g transform="translate(584,0)">
      <rect width="260" height="58" rx="29" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
      <text x="28" y="38">🌟  Sem WhatsApp</text>
    </g>
  </g>

  <!-- URL -->
  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="rgba(255,255,255,.55)">endodoc.com.br</text>
</svg>
